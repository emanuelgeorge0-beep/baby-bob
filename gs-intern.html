}
function hideJUnlock(){ var b=$('j-unlock'); if(b&&b.parentNode) b.parentNode.removeChild(b); }

// ── Spracheingabe: Aufnahme (MediaRecorder) → ElevenLabs Speech-to-Text (/api/voice). ──
// Tippen startet, Tippen stoppt. iPhone/Safari nimmt audio/mp4 auf, Chrome/Android
// audio/webm — der Server bekommt die MIME-Art mit und benennt die Datei passend.
// Fällt der Recorder aus (sehr alter Browser), nutzen wir als Fallback die native
// Browser-Erkennung (webkitSpeechRecognition). Beide landen in jarvisAsk().
var _jMediaRec=null, _jMediaStream=null, _jChunks=[], _jRecMime='', _jMaxTimer=null, _jUseSR=false;

function jSRsupported(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }
function mediaRecSupported(){
  return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
}
function pickRecMime(){
  var cands=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/mpeg','audio/aac','audio/ogg'];
  if(window.MediaRecorder && MediaRecorder.isTypeSupported){
    for(var i=0;i<cands.length;i++){ try{ if(MediaRecorder.isTypeSupported(cands[i])) return cands[i]; }catch(e){} }
  }
  return '';
}
function toggleJarvisMic(){ if(_jRecording){ stopJarvisMic(false); } else { startJarvisMic(); } }
function startJarvisMic(){
  if(_jRecording) return;
  stopSpeak();
  pauseWake();
  if(mediaRecSupported()){ _jUseSR=false; startMediaMic(); return; }
  if(jSRsupported()){ startSRMic(); return; }
  resumeWake();
  jState('Spracheingabe auf diesem Gerät nicht möglich — bitte Text eingeben.','idle');
  toast('Spracheingabe nicht verfügbar');
}
function micBtnRec(){ var b=$('j-mic'); if(b){ b.classList.add('rec'); b.textContent='⏹'; b.title='Aufnahme stoppen'; } }
function micFail(msg){
  _jRecording=false; cleanupMedia(); jSRresetBtn();
  jState(msg,'idle'); toast(msg); resumeWake();
}
function cleanupMedia(){
  if(_jMaxTimer){ clearTimeout(_jMaxTimer); _jMaxTimer=null; }
  try{ if(_jMediaStream){ _jMediaStream.getTracks().forEach(function(t){ try{ t.stop(); }catch(e){} }); } }catch(e){}
  _jMediaStream=null; _jMediaRec=null;
}
// Primär: echtes Audio aufnehmen und an den Server-STT schicken (zuverlässig, auch iPhone).
function startMediaMic(){
  jState('Mikrofon wird aktiviert…','think');
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    _jMediaStream=stream; _jChunks=[]; _jRecMime=pickRecMime();
    try{ _jMediaRec=_jRecMime?new MediaRecorder(stream,{mimeType:_jRecMime}):new MediaRecorder(stream); }
    catch(e){ try{ _jMediaRec=new MediaRecorder(stream); }catch(e2){ micFail('Aufnahme auf diesem Gerät nicht möglich'); return; } }
    if(!_jRecMime) _jRecMime=_jMediaRec.mimeType||'audio/webm';
    _jMediaRec.ondataavailable=function(ev){ if(ev.data&&ev.data.size>0) _jChunks.push(ev.data); };
    _jMediaRec.onstop=onMediaStop;
    try{ _jMediaRec.start(); }catch(e){ micFail('Aufnahme konnte nicht starten'); return; }
    _jRecording=true; micBtnRec();
    jState('● Ich höre zu… — zum Stoppen tippen','speak');
    // Sicherheits-Stopp nach 30 s (verhindert riesige Uploads / Hänger).
    _jMaxTimer=setTimeout(function(){ if(_jRecording&&!_jUseSR) stopJarvisMic(false); },30000);
  }).catch(function(err){
    var name=(err&&err.name)||'';
    if(name==='NotAllowedError'||name==='SecurityError') micFail('Mikrofon-Zugriff verweigert — bitte in den Browser-Einstellungen erlauben.');
    else if(name==='NotFoundError'||name==='OverconstrainedError') micFail('Kein Mikrofon gefunden.');
    else micFail('Mikrofon nicht verfügbar.');
  });
}
// Aufnahme fertig → Blob als base64 an /api/voice (action:'stt') → erkannter Text → Bob fragen.
function onMediaStop(){
  var chunks=_jChunks; _jChunks=[];
  var fullMime=_jRecMime||'audio/webm';
  var mime=fullMime.split(';')[0];
  cleanupMedia(); jSRresetBtn();
  if(!chunks.length){ jState('Nichts aufgenommen. Bitte nochmal.','idle'); toast('Nichts aufgenommen'); resumeWake(); return; }
  var blob=new Blob(chunks,{type:fullMime});
  jState('Verarbeite…','think');
  var reader=new FileReader();
  reader.onloadend=function(){
    fetch('/api/voice',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'stt',audio:String(reader.result||''),mime:mime})})
    .then(function(r){ return r.json().catch(function(){return {};}); })
    .then(function(d){
      var txt=((d&&d.text)||'').trim();
      if(txt){ jState('Verstehe dich','think'); jarvisAsk(txt); }
      else if(d&&d.fallback&&jSRsupported()){ jState('Erkenne lokal…','think'); startSRMic(); }
      else { jState('Konnte nichts erkennen. Bitte nochmal.','idle'); toast('Nichts erkannt'); resumeWake(); }
    })
    .catch(function(){ jState('Spracherkennung nicht erreichbar. Bitte nochmal.','idle'); toast('Verbindungsfehler'); resumeWake(); });
  };
  reader.readAsDataURL(blob);
}
// Fallback: native Browser-Erkennung (nur wenn MediaRecorder fehlt oder Server-STT ausfällt).
function startSRMic(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ micFail('Spracheingabe hier nicht verfügbar'); return; }
  _jUseSR=true;
  _jBase=''; _jSessionFinal=''; _jWantRec=true; _jRecording=true; _jSRrestarts=0;
  micBtnRec();
  jState('● Ich höre zu… — zum Stoppen tippen','speak');
  jSRbegin(SR);
}
function jSRbegin(SR){
  try{ _jSR=new SR(); }catch(e){ _jRecording=false; _jWantRec=false; toast('Spracheingabe nicht verfügbar'); jSRresetBtn(); return; }
  _jSessionFinal=''; _jLastInterim='';
  _jSR.lang='de-CH';                  // Schweizer Hochdeutsch
  _jSR.interimResults=true;          // Teilergebnisse → flüssige Anzeige, nichts geht verloren
  _jSR.continuous=true;              // Android: durchgehend; iOS endet bei Pause → wir starten neu
  try{ _jSR.maxAlternatives=1; }catch(e){}
  _jSR.onresult=function(e){
    // e.results ist innerhalb EINER Session kumulativ → pro Session ersetzen, nicht anhängen.
    var fin='', interim='';
    for(var i=0;i<e.results.length;i++){
      if(e.results[i].isFinal) fin+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }
    _jSessionFinal=fin.trim();
    if(interim.trim()) _jLastInterim=interim.trim();   // letztes Teilergebnis merken
    var show=((_jBase+' '+_jSessionFinal+' '+interim).trim());
    if(show) jState('… '+show,'speak');
  };
  _jSR.onerror=function(ev){
    var err=(ev&&ev.error)||'';
    if(err==='not-allowed'||err==='service-not-allowed'){ _jWantRec=false; _jRecording=false; jSRresetBtn(); toast('Mikrofon-Zugriff verweigert'); }
    // 'no-speech'/'aborted'/'network' → onend übernimmt (Neustart oder Abschluss)
  };
  _jSR.onend=function(){
    // Session zu Ende → finalen Text (sonst letztes Teilergebnis, damit nichts verloren geht) übernehmen.
    var got=_jSessionFinal || _jLastInterim;
    if(got){ _jBase=(_jBase? _jBase+' ':'')+got; _jSessionFinal=''; _jLastInterim=''; }
    // iOS beendet bei Pause. Will der Nutzer weiter → neu starten (kein vorzeitiges Abschneiden).
    if(_jWantRec && _jSRrestarts<40){ _jSRrestarts++; try{ jSRbegin(SR); return; }catch(e){} }
    jSRfinalize();
  };
  try{ _jSR.start(); }
  catch(e){ /* start() direkt nach end() kann werfen → kurz warten, dann erneut */
    if(_jWantRec && _jSRrestarts<40){ _jSRrestarts++; setTimeout(function(){ try{ jSRbegin(SR); }catch(_){ jSRfinalize(); } },250); }
    else jSRfinalize();
  }
}
function jSRfinalize(){
  _jRecording=false; _jWantRec=false; _jSR=null;
  jSRresetBtn();
  var txt=((_jBase+' '+(_jSessionFinal||_jLastInterim)).trim());
  if(txt){ jState('Verstehe dich','think'); jarvisAsk(txt); }
  else { jState('Konnte nichts erkennen. Bitte nochmal.','idle'); toast('Nichts erkannt'); resumeWake(); }
}
function jSRresetBtn(){ var b=$('j-mic'); if(b){ b.classList.remove('rec'); b.textContent='🎤'; b.title='Sprechen'; } }
function stopJarvisMic(silent){
  if(_jUseSR){
    // Native Browser-Erkennung: kein Neustart mehr, Ergebnis verarbeiten (siehe jSRfinalize).
    _jWantRec=false;
    try{ if(_jSR) _jSR.stop(); }catch(e){}
    if(silent){ _jRecording=false; jSRresetBtn(); }  // von jarvisAsk → nur abbrechen
    return;
  }
  // MediaRecorder-Modus.
  if(silent){
    // Nur abbrechen (z. B. weil parallel eine Frage kam) → NICHT an STT schicken.
    if(_jMediaRec){ try{ _jMediaRec.onstop=function(){ cleanupMedia(); }; _jMediaRec.stop(); }catch(e){} }
    _jRecording=false; cleanupMedia(); jSRresetBtn(); return;
  }
  _jRecording=false;
  if(_jMediaRec && _jMediaRec.state!=='inactive'){ try{ _jMediaRec.stop(); }catch(e){ onMediaStop(); } }
  else { onMediaStop(); }
}

// ════ „HEY BOB" WAKE-WORD + BLOCKADEN-ANSICHT ════
// Zwei Wege zu Bob: (a) Dauer-Zuhören mit Wake-Word „Hey Bob" (Toggle im Bob-View),
// (b) Tap-to-Talk-Mikrofon als zuverlässiger Fallback. Beide landen in jarvisAsk()
// → /api/cockpit {action:'voice'} → echte Daten + Antwort + Navigation.
var _bobViewParams=null;
var _wakeOn=false, _wakeSR=null, _wakePaused=false, _wakeRestarts=0, _wakeLastBegin=0;

// iOS/Safari: SpeechRecognition ist dort unzuverlässig → Tap-to-Talk ist der
// sichere Weg (MediaRecorder + Server-STT). Wird für den Hinweistext genutzt.
function isIOS(){
  return /iP(hone|ad|od)/.test(navigator.userAgent)
    || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
}

// ── Robuste „Bob"-Erkennung ─────────────────────────────────────────────────
// de-CH-Spracherkennung verhört „Bob" oft (bop, bopp, bab, baby, pop, papp, bub …).
// Wir normalisieren, prüfen mehrere Erkennungs-Alternativen und akzeptieren jedes
// Token nach dem Muster: b/p – 1-3 Vokale – b/p (mit optionaler Endung).
function _wnorm(s){ return String(s||'').toLowerCase()
  .replace(/ä/g,'a').replace(/ö/g,'o').replace(/ü/g,'u').replace(/ß/g,'ss')
  .replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim(); }
var _GREET_TOK=/^(?:h+e+y+|h[ae]l+o+|hallo|halo|h+e+|h+i+|hoi|hey|yo|na|ok|okay|okey|jo|ey|eh|hej)$/;
var _BOB_TOK=/^[bp][aeiouy]{1,3}[bp]{1,2}(?:by|y|i|s|e|o|a)?$/;
// Slice aus dem ORIGINAL (behält Umlaute/Zahlen im Befehl, z. B. „Wädenswil").
var _WAKE_SLICE=/^\s*(?:(?:hey+|h[aä]l+o+|hallo|halo|he+|hi+|hoi|yo|na|ok|okay|okey|jo|ey|eh)\b[\s,.!?:-]*)?(?:[bp][aeiouyäöü]{1,3}[bp]{1,2}(?:by|y|i|s|e|o|a)?)\b[\s,.!?:-]*/i;
function wakeParse(raw){
  var orig=String(raw||'').trim(); if(!orig) return null;
  var toks=_wnorm(orig).split(' '); if(!toks[0]) return null;
  var idx=-1;
  for(var i=0;i<toks.length && i<3;i++){
    if(_BOB_TOK.test(toks[i]) && (i===0 || _GREET_TOK.test(toks[i-1]))){ idx=i; break; }
  }
  if(idx===-1) return null;
  var cmd=toks.slice(idx+1).join(' ').trim();     // Fallback: normalisierter Rest
  var mo=orig.match(_WAKE_SLICE);                 // besser: Rest aus dem Original
  if(mo) cmd=orig.slice(mo[0].length).trim();
  return { cmd: cmd };
}

function wakeSupported(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }
function toggleWake(){
  unlockJAudio();                       // Audio im Tap-Kontext entsperren (iOS)
  if(_wakeOn) stopWake(); else startWake();
}
function startWake(){
  if(!wakeSupported()){ toast('Dauer-Zuhören hier nicht unterstützt — nutze das 🎤 Mikrofon'); return; }
  if(_jRecording) stopJarvisMic(true);  // Tap-to-Talk und Wake nie gleichzeitig
  _wakeOn=true; _wakePaused=false; _wakeRestarts=0; wakeBegin(); paintWake();
  toast(isIOS()? 'Hört zu — auf dem iPhone ist das 🎤 zuverlässiger' : 'Bob hört zu — sag „Hey Bob …"');
}
function stopWake(){ _wakeOn=false; try{ if(_wakeSR) _wakeSR.stop(); }catch(e){} _wakeSR=null; paintWake(); }
function pauseWake(){ if(!_wakeOn) return; _wakePaused=true; try{ if(_wakeSR) _wakeSR.stop(); }catch(e){} _wakeSR=null; paintWake(); }
function resumeWake(){ if(!_wakeOn||!_wakePaused) return; _wakePaused=false; _wakeRestarts=0; setTimeout(wakeBegin,250); paintWake(); }
function wakeBegin(){
  if(!_wakeOn||_wakePaused) return;
  // Hot-Loop-Schutz: startet die Erkennung immer wieder sofort neu (z. B. wenn das
  // Mikro belegt ist), bremsen wir progressiv statt Dauerfeuer.
  var now=Date.now();
  if(now-_wakeLastBegin<1200){ _wakeRestarts++; } else { _wakeRestarts=0; }
  _wakeLastBegin=now;
  var backoff=_wakeRestarts>3 ? Math.min(4000, 400*_wakeRestarts) : 0;
  if(backoff){ setTimeout(function(){ if(_wakeOn&&!_wakePaused) wakeBegin2(); },backoff); return; }
  wakeBegin2();
}
function wakeBegin2(){
  if(!_wakeOn||_wakePaused) return;
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  try{ _wakeSR=new SR(); }catch(e){ _wakeOn=false; paintWake(); return; }
  _wakeSR.lang='de-CH'; _wakeSR.continuous=true; _wakeSR.interimResults=false;
  try{ _wakeSR.maxAlternatives=4; }catch(e){}   // mehrere Alternativen → „Bob" öfter dabei
  _wakeSR.onresult=function(e){
    for(var i=e.resultIndex;i<e.results.length;i++){
      var r=e.results[i]; if(!r.isFinal) continue;
      var alts=Math.min(r.length||1,4);
      for(var a=0;a<alts;a++){
        var w=wakeParse((r[a]&&r[a].transcript)||'');
        if(w){ wakeHeard(w.cmd); return; }
      }
    }
  };
  _wakeSR.onerror=function(ev){
    var err=(ev&&ev.error)||'';
    if(err==='not-allowed'||err==='service-not-allowed'){ _wakeOn=false; toast('Mikrofon-Zugriff verweigert'); paintWake(); }
    // no-speech/aborted/network → onend startet neu
  };
  _wakeSR.onend=function(){ _wakeSR=null; if(_wakeOn&&!_wakePaused) setTimeout(wakeBegin,250); };
  try{ _wakeSR.start(); }
  catch(e){ if(_wakeOn&&!_wakePaused) setTimeout(wakeBegin,400); }
}
function wakeFlash(){                    // kurzes visuelles Signal „erkannt"
  var bar=$('wake-bar'); if(!bar) return;
  bar.classList.add('hit'); setTimeout(function(){ bar.classList.remove('hit'); },900);
}
function wakeHeard(cmd){
  cmd=(cmd||'').trim();
  pauseWake();                          // Selbst-Trigger während Antwort vermeiden
  wakeFlash();
  if(curView!=='jarvis') go('jarvis');
  if(!cmd){                             // nur „Hey Bob" → begrüssen, dann Ohr auf
    jState('● Hallo Master, ich bin hier… sag deinen Befehl','speak');
    if(_jVoiceOn) speakJarvis('Hallo Master, ich bin hier. Wie kann ich dir helfen?'); else resumeWake();
    return;
  }
  jarvisAsk(cmd);
}
function paintWake(){
  var sw=$('wake-sw'); if(sw) sw.className='wsw'+(_wakeOn?' on':'');
  var bar=$('wake-bar');
  if(bar) bar.className='wakebar'+(_wakeOn?(_wakePaused?' live paused':' live'):'');
  var lbl=$('wake-lbl'); if(!lbl) return;
  lbl.innerHTML=_wakeOn
    ? (_wakePaused ? 'Bob antwortet … <b>hört gleich wieder zu</b>'
                   : '<span class="wdot"></span>Hört zu · sag <b>„Hey Bob …"</b>')
    : (wakeSupported()
        ? (isIOS()
            ? 'Dauer-Zuhören ist auf dem iPhone unzuverlässig — am besten das <b>🎤 (Tap-to-Talk)</b> nutzen.'
            : 'Dauer-Zuhören: Schalter an, dann <b>„Hey Bob …"</b>. Oder tippe aufs 🎤.')
        : 'Dauer-Zuhören hier nicht möglich — nutze das <b>🎤 (Tap-to-Talk)</b>.');
}

var MKT_RANGES=[{k:'alle',l:'Alle'},{k:'30',l:'30 Tage'},{k:'90',l:'90 Tage'},{k:'month',l:'Dieser Monat'},{k:'year',l:'Dieses Jahr'}];
var mktRange='alle', _kampCache=[];
function mktVonBis(){
  function iso(d){ return d.toISOString().slice(0,10); }
  var now=new Date(), bis=iso(now), d;
  if(mktRange==='30'){ d=new Date(now); d.setDate(d.getDate()-29); return {von:iso(d),bis:bis}; }
  if(mktRange==='90'){ d=new Date(now); d.setDate(d.getDate()-89); return {von:iso(d),bis:bis}; }
  if(mktRange==='month'){ return {von:bis.slice(0,7)+'-01', bis:bis}; }
  if(mktRange==='year'){ return {von:bis.slice(0,4)+'-01-01', bis:bis}; }
  return {von:null,bis:null};
}
function renderMarketing(){
  var chips=MKT_RANGES.map(function(r){ return '<span class="chip'+(mktRange===r.k?' on':'')+'" data-mr="'+r.k+'">'+r.l+'</span>'; }).join('');

// ════ TO-DOS ════
function renderTodos(){
  $('view').innerHTML='<h2><span class="acc">✅</span> To-Dos</h2>'+backRow()+
    '<button class="btn-sm btn-gold" id="todo-add" style="width:100%;margin-bottom:12px">+ Neue Aufgabe</button>'+
    '<div class="list" id="todo-list">'+skeletonCards(4)+'</div>';
  wireBack();
  $('todo-add').onclick=function(){ openTodoForm(null); };
  api('todos').then(function(d){ _todoCache=d.todos||[]; paintTodos(_todoCache); }).catch(function(){ var b=$('todo-list'); if(b) b.innerHTML=migHint(); });
}
var _todoCache=[];
function paintTodos(todos){
  var offen=todos.filter(function(t){return t.status==='offen';});
  var done=todos.filter(function(t){return t.status==='erledigt';});
  if(!todos.length){ $('todo-list').innerHTML='<div class="empty">Keine To-Dos. Lege die erste Aufgabe an.</div>'; return; }
  var html=offen.map(todoCard).join('');
  if(done.length) html+='<div class="sec-t" style="border:none">Erledigt ('+done.length+')</div>'+done.map(todoCard).join('');
  $('todo-list').innerHTML=html;
  wireTodoCards();
}
function prioBadge(p){
  var m={hoch:'b-verloren',mittel:'b-angebot',niedrig:'b-neu'};
  return '<span class="badge '+(m[p]||'b-neu')+'">'+esc(p||'mittel')+'</span>';
}
function todoCard(t){
  var done=t.status==='erledigt';
  var fu='';
  if(!done && t.fu_state){ fu='<span class="fu '+t.fu_state+'">'+(t.fu_state==='ueberfaellig'?'⚠ '+deDate(t.faelligkeit):t.fu_state==='heute'?'★ heute':'⏱ '+deDate(t.faelligkeit))+'</span>'; }
  return '<div class="task-item'+(t.fu_state==='ueberfaellig'&&!done?' over':'')+'" style="flex-wrap:wrap" data-todo="'+t.id+'" data-done="'+(done?1:0)+'">'+
    '<button class="check" data-tdone="'+t.id+'" style="'+(done?'opacity:.5':'')+'">'+(done?'↩':'✓')+'</button>'+
    '<span class="tx" style="'+(done?'text-decoration:line-through;color:var(--muted)':'')+'">'+esc(t.titel)+'</span>'+
    prioBadge(t.prioritaet)+
    '<div class="meta" style="flex-basis:100%;align-items:center;margin-top:4px">'+
      (t.zustaendig?'<span class="assign">👤 '+esc(t.zustaendig)+'</span>':'')+
      fu+
      '<span class="assign" style="margin-left:auto" data-tedit="'+t.id+'">bearbeiten ›</span>'+
    '</div></div>';
}
function wireTodoCards(){
  Array.prototype.forEach.call($('todo-list').querySelectorAll('[data-tdone]'),function(b){
    b.onclick=function(e){ e.stopPropagation();
      var card=b.closest('[data-todo]'); var isDone=card&&card.getAttribute('data-done')==='1';
      api('todo_update',{id:b.getAttribute('data-tdone'),status:isDone?'offen':'erledigt'})
        .then(function(){ toast(isDone?'Reaktiviert':'Erledigt'); renderTodos(); refreshDashSilent(); }).catch(function(){ toast('Fehler'); });
    };
  });
  Array.prototype.forEach.call($('todo-list').querySelectorAll('[data-tedit]'),function(b){
    b.onclick=function(e){ e.stopPropagation(); var t=_todoCache.filter(function(x){return x.id===b.getAttribute('data-tedit');})[0]; if(t) openTodoForm(t); };
  });
}
function openTodoForm(t){
  t=t||{};
  openSheet('');
  sheetBody.innerHTML='<h3>'+(t.id?'Aufgabe bearbeiten':'Neue Aufgabe')+'</h3>'+
    '<input class="field" id="t-titel" placeholder="Titel" value="'+esc(t.titel||'')+'"/>'+
    '<textarea class="field" id="t-besch" placeholder="Beschreibung (optional)">'+esc(t.beschreibung||'')+'</textarea>'+
    '<div class="row2"><select class="field" id="t-zust"><option value="">Zuständig…</option>'+
      MITARBEITER.map(function(m){ return '<option'+(t.zustaendig===m?' selected':'')+'>'+m+'</option>'; }).join('')+'</select>'+
    '<input class="field" id="t-faell" type="date" value="'+esc(t.faelligkeit||'')+'"/></div>'+
    '<select class="field" id="t-prio">'+['niedrig','mittel','hoch'].map(function(p){ return '<option value="'+p+'"'+((t.prioritaet||'mittel')===p?' selected':'')+'>'+cap(p)+' Priorität</option>'; }).join('')+'</select>'+
    '<button class="btn-sm btn-gold" id="t-save" style="width:100%">'+(t.id?'Speichern':'Anlegen')+'</button>'+
    (t.id?'<button class="btn-sm" id="t-del" style="width:100%;margin-top:8px;color:var(--bad);border-color:rgba(255,93,93,.3)">Löschen</button>':'');
  $('t-save').onclick=function(){
    var titel=$('t-titel').value.trim(); if(!titel){ toast('Titel eingeben'); return; }
    var p={titel:titel,beschreibung:$('t-besch').value.trim(),zustaendig:$('t-zust').value,faelligkeit:$('t-faell').value||null,prioritaet:$('t-prio').value};
    var call = t.id ? api('todo_update',Object.assign({id:t.id},p)) : api('todo_add',p);
    call.then(function(){ toast('Gespeichert'); closeSheet(); renderTodos(); refreshDashSilent(); }).catch(function(){ toast('Migration nötig?'); });
  };
  if(t.id) $('t-del').onclick=function(){ api('todo_del',{id:t.id}).then(function(){ toast('Gelöscht'); closeSheet(); renderTodos(); refreshDashSilent(); }).catch(function(){ toast('Fehler'); }); };
}

// ════ VERKAUF / MARGEN ════
var _margePickers={anfragen:[],projekte:[]};
function renderMargen(){
  $('view').innerHTML='<h2><span class="acc">💰</span> Verkauf &amp; Margen</h2>'+backRow()+
    '<button class="btn-sm btn-gold" id="marge-add" style="width:100%;margin-bottom:12px">+ Projekt / Position</button>'+
    '<div id="marge-totals"></div><div class="list" id="marge-list">'+skeletonCards(3)+'</div>';
  wireBack();
  $('marge-add').onclick=function(){ openMargeForm(null); };
  // Picker-Listen (Lead/Projekt) für die Verknüpfung vorladen — unabhängig von Margen.
  api('marge_pickers').then(function(p){ _margePickers={anfragen:p.anfragen||[],projekte:p.projekte||[]}; }).catch(function(){});
  api('margen').then(function(d){ paintMargen(d); }).catch(function(){ var b=$('marge-list'); if(b) b.innerHTML=migHint(); });
}
function pickerOptions(items, sel, placeholder){
  return '<option value="">'+placeholder+'</option>'+(items||[]).map(function(it){
    return '<option value="'+esc(it.id)+'"'+(sel===it.id?' selected':'')+'>'+esc(it.label)+'</option>';
  }).join('');
}
function paintMargen(d){
  var t=d.totals||{umsatz:0,marge:0,prozent:0,einkauf:0};
  $('marge-totals').innerHTML='<div class="grid">'+
    tile('Umsatz gesamt', chf(t.umsatz), '', 'gold')+
    tile('Einkauf gesamt', chf(t.einkauf), '')+
    tileWide('Marge gesamt', chf(t.marge)+' <span class="sfx">· '+t.prozent+'%</span>', t.marge>=0?'ok':'bad')+
  '</div><div style="height:14px"></div>';
  var rows=(d.margen||[]);
  if(!rows.length){ $('marge-list').innerHTML='<div class="empty">Noch keine Positionen. Lege ein Projekt an.</div>'; return; }
  $('marge-list').innerHTML=rows.map(function(m){
    var link=[];
    if(m.anfrage_titel) link.push('🔗 '+esc(m.anfrage_titel));
    if(m.projekt_titel) link.push('🏗 '+esc(m.projekt_titel));
    return '<div class="lcard" data-marge="'+m.id+'">'+
      '<div class="top"><div class="nm">'+esc(m.titel)+'</div>'+
        '<span class="badge '+(m.marge>=0?'b-gewonnen':'b-verloren')+'">'+m.prozent+'%</span></div>'+
      (link.length?'<div class="meta" style="color:var(--gold)">'+link.join('<span class="dot"></span>')+'</div>':'')+
      '<div class="meta" style="align-items:center">'+
        '<span>Umsatz <b style="color:var(--gold)">'+chf(m.umsatz)+'</b></span>'+
        '<span class="dot">Einkauf '+chf(m.einkauf)+'</span>'+
        '<span class="dot">Marge <b style="color:'+(m.marge>=0?'var(--ok)':'var(--bad)')+'">'+chf(m.marge)+'</b></span>'+
      '</div>'+
      ((m.stundensatz||m.stunden)?'<div class="meta" style="color:var(--muted2)">'+m.stunden+' h × '+chf(m.stundensatz)+'</div>':'')+
    '</div>';
  }).join('');
  Array.prototype.forEach.call($('marge-list').querySelectorAll('[data-marge]'),function(c){
    var m=rows.filter(function(x){return x.id===c.getAttribute('data-marge');})[0];
    c.onclick=function(){ openMargeForm(m); };
  });
}
function openMargeForm(m){
  m=m||{};
  openSheet('');
  sheetBody.innerHTML='<h3>'+(m.id?'Position bearbeiten':'Neue Position')+'</h3>'+
    '<div class="h-sub">Umsatz = Stundensatz × Stunden (oder manuell). Marge = Umsatz − Einkauf.</div>'+
    '<input class="field" id="m-titel" placeholder="Projekt / Bezeichnung" value="'+esc(m.titel||'')+'"/>'+
    '<label style="font-size:11px;color:var(--muted)">Verknüpfter Lead / Anfrage</label>'+
    '<select class="field" id="m-anfrage">'+pickerOptions(_margePickers.anfragen, m.anfrage_id||'', 'kein Lead')+'</select>'+
    '<label style="font-size:11px;color:var(--muted)">Verknüpftes Projekt</label>'+
    '<select class="field" id="m-projekt">'+pickerOptions(_margePickers.projekte, m.projekt_id||'', 'kein Projekt')+'</select>'+
    '<div class="row2"><div><label style="font-size:11px;color:var(--muted)">Stundensatz</label><input class="field" id="m-satz" type="number" inputmode="decimal" value="'+(m.stundensatz||'')+'"/></div>'+
    '<div><label style="font-size:11px;color:var(--muted)">Stunden</label><input class="field" id="m-std" type="number" inputmode="decimal" value="'+(m.stunden||'')+'"/></div></div>'+
    '<div class="row2"><div><label style="font-size:11px;color:var(--muted)">Einkauf / Material</label><input class="field" id="m-eink" type="number" inputmode="decimal" value="'+(m.einkauf||'')+'"/></div>'+
    '<div><label style="font-size:11px;color:var(--muted)">Umsatz manuell (optional)</label><input class="field" id="m-ums" type="number" inputmode="decimal" value="'+(m.umsatz_manuell!=null?m.umsatz_manuell:'')+'"/></div></div>'+
    '<textarea class="field" id="m-notiz" placeholder="Notiz (optional)">'+esc(m.notiz||'')+'</textarea>'+
    '<div id="m-preview" class="tile" style="margin-bottom:10px"></div>'+
    '<button class="btn-sm btn-gold" id="m-save" style="width:100%">'+(m.id?'Speichern':'Anlegen')+'</button>'+
    (m.id?'<button class="btn-sm" id="m-del" style="width:100%;margin-top:8px;color:var(--bad);border-color:rgba(255,93,93,.3)">Löschen</button>':'');
  function preview(){
    var satz=parseFloat($('m-satz').value)||0, std=parseFloat($('m-std').value)||0, eink=parseFloat($('m-eink').value)||0;
    var umsM=$('m-ums').value; var ums=(umsM!==''&&umsM!=null)?(parseFloat(umsM)||0):satz*std;
    var marge=ums-eink, pz=ums>0?Math.round(marge/ums*100):0;
    $('m-preview').innerHTML='<div class="k">Vorschau</div><div class="v mono '+(marge>=0?'ok':'bad')+'" style="font-size:22px">'+chf(Math.round(marge))+' <span class="sfx">'+pz+'% · Umsatz '+chf(Math.round(ums))+'</span></div>';
  }
  ['m-satz','m-std','m-eink','m-ums'].forEach(function(id){ $(id).addEventListener('input',preview); }); preview();
  $('m-save').onclick=function(){
    var titel=$('m-titel').value.trim(); if(!titel){ toast('Bezeichnung eingeben'); return; }
    var anfrageId=$('m-anfrage').value||'', projektId=$('m-projekt').value||'';
    var p={titel:titel,stundensatz:$('m-satz').value,stunden:$('m-std').value,einkauf:$('m-eink').value,umsatz_manuell:$('m-ums').value,notiz:$('m-notiz').value.trim(),
      anfrage_id:anfrageId, projekt_id:projektId};
    // Projekt entkoppeln nur, wenn vorher eins gesetzt war (Spalte existiert dann seit S3).
    if(m.id && m.projekt_id && !projektId) p.projekt_id_clear=true;
    var call = m.id ? api('marge_update',Object.assign({id:m.id},p)) : api('marge_add',p);
    call.then(function(){ toast('Gespeichert'); closeSheet(); renderMargen(); refreshDashSilent(); }).catch(function(){ toast('Migration nötig?'); });
  };
  if(m.id) $('m-del').onclick=function(){ api('marge_del',{id:m.id}).then(function(){ toast('Gelöscht'); closeSheet(); renderMargen(); refreshDashSilent(); }).catch(function(){ toast('Fehler'); }); };
}

var ST_LABEL={aktiv:'aktiv',aufbau:'im Aufbau',geplant:'geplant'};

// ── PWA: Service-Worker + Install-Hinweis ──
// SW macht das Cockpit auf Android installierbar (fetch-Handler) + schneller Start.
// updateViaCache:'none' → SW-Updates trotz immutable-Cache der .js-Assets.
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/cockpit-sw.js',{scope:'/gs-intern-7k2x',updateViaCache:'none'}).catch(function(){});
  });
}
var _deferredInstall=null;
window.addEventListener('beforeinstallprompt',function(e){ e.preventDefault(); _deferredInstall=e; maybeShowInstall(); });
window.addEventListener('appinstalled',function(){ _deferredInstall=null; var b=$('installbar'); if(b) b.remove(); });
function isStandalone(){
  return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || navigator.standalone===true;
}
function installDismissed(){ try{ return localStorage.getItem('gs_install_hint_off')==='1'; }catch(e){ return false; } }
function isIOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1); }
// Wird nach Login (enterApp) und bei beforeinstallprompt aufgerufen.
function maybeShowInstall(){
  if(!TOKEN) return;                       // nur im eingeloggten Cockpit
  if(isStandalone() || installDismissed()) return;
  if($('installbar')) return;              // schon sichtbar
  var android = !!_deferredInstall, ios = isIOS();
  if(!android && !ios) return;             // Desktop-Browser ohne Prompt → kein Hinweis
  var bar=document.createElement('div'); bar.className='installbar'; bar.id='installbar';
  if(android){
    bar.innerHTML='<span class="ii">📲</span><span class="it"><b>Als App installieren</b><br>Cockpit zum Homescreen hinzufügen — öffnet wie eine echte App.</span>'+
      '<button class="ibtn" id="install-go">Installieren</button><button class="ix" id="install-x">×</button>';
  } else {
    bar.innerHTML='<span class="ii">📲</span><span class="it"><b>Zum Homescreen hinzufügen</b><br>In Safari: <b>Teilen</b> ⬆️ → <b>Zum Home-Bildschirm</b>. Dann läuft das Cockpit wie eine App.</span>'+
      '<button class="ix" id="install-x">×</button>';
  }
  var v=$('view'); v.parentNode.insertBefore(bar, v);
  var go=$('install-go');
  if(go) go.onclick=function(){
    if(_deferredInstall){ _deferredInstall.prompt(); _deferredInstall.userChoice.then(function(){ _deferredInstall=null; bar.remove(); }); }
  };
  $('install-x').onclick=function(){ try{ localStorage.setItem('gs_install_hint_off','1'); }catch(e){} bar.remove(); };
}

// ── Go ──
boot();
