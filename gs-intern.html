<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"/>
<meta name="robots" content="noindex,nofollow,noarchive"/>
<meta name="referrer" content="no-referrer"/>
<meta name="theme-color" content="#0a0e14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Master George"/>
<title>GS</title>
<link rel="manifest" href="/cockpit-manifest.json"/>
<!-- iOS ignoriert SVG-apple-touch-icons → echtes PNG, damit das Homescreen-Icon korrekt erscheint. -->
<link rel="apple-touch-icon" sizes="180x180" href="/cockpit-icon-180.png"/>
<link rel="apple-touch-icon" href="/cockpit-icon-180.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/cockpit-icon-192.png"/>
<style>
  :root{
    --bg:#0A0A0B; --bg2:#0f1116; --card:#131519; --card2:#181b21;
    --gold:#C9A961; --gold-soft:rgba(201,169,97,.14); --gold-line:rgba(201,169,97,.28);
    --txt:#e8edf5; --muted:#8a97a8; --muted2:#5c6878;
    --ok:#3ecf8e; --warn:#f5b942; --bad:#ff5d5d; --info:#5aa7ff;
    --line:rgba(255,255,255,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  body{min-height:100vh;background:
    radial-gradient(900px 500px at 80% -10%, rgba(201,169,97,.06), transparent 60%),
    radial-gradient(700px 500px at -10% 10%, rgba(90,167,255,.05), transparent 55%),
    var(--bg);}
  button{font-family:inherit;cursor:pointer;border:none;}
  input,select,textarea{font-family:inherit;font-size:15px;}
  a{color:var(--gold);text-decoration:none;}
  .hidden{display:none!important;}
  .mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}

  /* ── Login ── */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .login-box{width:100%;max-width:380px;background:var(--card);border:1px solid var(--gold-line);
    border-radius:20px;padding:34px 26px;box-shadow:0 30px 80px rgba(0,0,0,.5);}
  .crest{width:64px;height:64px;border-radius:18px;border:2px solid var(--gold);display:flex;
    align-items:center;justify-content:center;margin:0 auto 18px;font:700 30px Georgia,serif;
    color:var(--gold);letter-spacing:1px;background:var(--gold-soft);}
  .login-box h1{font-size:19px;text-align:center;margin:0 0 4px;letter-spacing:.5px;}
  .login-box .sub{text-align:center;color:var(--muted);font-size:13px;margin:0 0 24px;}
  .fld{margin-bottom:13px;}
  .fld label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.3px;}
  .fld input{width:100%;padding:13px 14px;background:var(--bg2);border:1px solid var(--line);
    border-radius:11px;color:var(--txt);outline:none;}
  .fld input:focus{border-color:var(--gold-line);}
  .btn{display:block;width:100%;padding:14px;border-radius:12px;font-weight:700;font-size:15px;
    background:linear-gradient(135deg,#d8b96e,#b8954d);color:#0a0e14;letter-spacing:.3px;}
  .btn:active{transform:translateY(1px);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:600;margin-top:10px;}
  .login-msg{min-height:18px;text-align:center;font-size:13px;margin-top:12px;}
  .login-msg.err{color:var(--bad);} .login-msg.ok{color:var(--ok);}

  /* ── App shell ── */
  #app{max-width:680px;margin:0 auto;padding:0 0 92px;min-height:100vh;}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
    padding:14px 18px;padding-top:calc(14px + env(safe-area-inset-top));
    background:rgba(7,10,15,.82);backdrop-filter:saturate(140%) blur(14px);
    border-bottom:1px solid var(--line);}
  .topbar .crest-sm{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;font:700 15px Georgia,serif;color:var(--gold);background:var(--gold-soft);}
  .topbar .tt{font-weight:700;font-size:15px;letter-spacing:.4px;}
  .topbar .tt small{display:block;font-weight:500;font-size:11px;color:var(--muted);letter-spacing:.5px;}
  .topbar .sp{flex:1;}
  .topbar .who{font-size:11px;color:var(--muted2);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .logout{font-size:12px;color:var(--muted);background:transparent;border:1px solid var(--line);
    border-radius:9px;padding:6px 10px;}

  .view{padding:18px;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .view h2{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
    margin:4px 0 14px;font-weight:700;}
  .view h2 .acc{color:var(--gold);}

  /* ── Dashboard tiles ── */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;position:relative;overflow:hidden;}
  .tile::after{content:'';position:absolute;inset:0 0 auto 0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-line),transparent);}
  .tile .k{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);}
  .tile .v{font-size:30px;font-weight:800;margin-top:6px;letter-spacing:-.5px;}
  .tile .v.gold{color:var(--gold);} .tile .v.warn{color:var(--warn);} .tile .v.bad{color:var(--bad);} .tile .v.ok{color:var(--ok);}
  .tile .sfx{font-size:13px;color:var(--muted);font-weight:600;}
  .tile.wide{grid-column:1/-1;}

  .stufebars{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
  .sb-row{display:flex;align-items:center;gap:10px;}
  .sb-row .lbl{width:92px;font-size:12px;color:var(--muted);text-transform:capitalize;}
  .sb-track{flex:1;height:9px;background:var(--bg2);border-radius:6px;overflow:hidden;}
  .sb-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#b8954d,var(--gold));}
  .sb-row .n{width:26px;text-align:right;font-weight:700;font-size:13px;}

  .src-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
  .src-chip{background:var(--bg2);border:1px solid var(--line);border-radius:50px;padding:6px 12px;font-size:12px;color:var(--muted);}
  .src-chip b{color:var(--gold);margin-left:5px;}

  /* ── Filter chips ── */
  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;-webkit-overflow-scrolling:touch;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:50px;
    padding:8px 14px;font-size:13px;color:var(--muted);white-space:nowrap;}
  .chip.on{background:var(--gold-soft);border-color:var(--gold-line);color:var(--gold);font-weight:700;}

  /* ── Lead / customer cards ── */
  .list{display:flex;flex-direction:column;gap:10px;}
  .lcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;
    display:flex;flex-direction:column;gap:7px;transition:border-color .15s;}
  .lcard:active{border-color:var(--gold-line);}
  .lcard .top{display:flex;align-items:flex-start;gap:10px;}
  .lcard .nm{font-weight:700;font-size:15px;flex:1;}
  .lcard .meta{font-size:12.5px;color:var(--muted);display:flex;flex-wrap:wrap;gap:4px 10px;}
  .lcard .meta .dot::before{content:'·';margin-right:8px;color:var(--muted2);}
  .badge{font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;
    padding:4px 9px;border-radius:50px;white-space:nowrap;}
  .b-neu{background:rgba(90,167,255,.14);color:var(--info);}
  .b-kontaktiert{background:rgba(201,169,97,.16);color:var(--gold);}
  .b-angebot{background:rgba(245,185,66,.16);color:var(--warn);}
  .b-gewonnen{background:rgba(62,207,142,.16);color:var(--ok);}
  .b-verloren{background:rgba(255,93,93,.14);color:var(--bad);}
  .src-tag{font-size:10.5px;color:var(--muted2);border:1px solid var(--line);border-radius:6px;padding:2px 7px;text-transform:capitalize;}
  .fu{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:50px;}
  .fu.heute{background:var(--gold-soft);color:var(--gold);}
  .fu.ueberfaellig{background:rgba(255,93,93,.15);color:var(--bad);}
  .fu.geplant{background:var(--bg2);color:var(--muted);}
  .assign{font-size:11px;color:var(--muted2);}

  .empty{text-align:center;color:var(--muted2);padding:40px 20px;font-size:14px;}
  .skeleton{height:78px;border-radius:14px;background:linear-gradient(90deg,var(--card),var(--card2),var(--card));
    background-size:200% 100%;animation:sk 1.2s infinite;}
  @keyframes sk{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

  /* ── Detail sheet ── */
  .sheet-bg{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);
    display:flex;align-items:flex-end;justify-content:center;animation:fade .2s ease;}
  .sheet{width:100%;max-width:680px;max-height:92vh;overflow-y:auto;background:var(--bg2);
    border-radius:22px 22px 0 0;border-top:1px solid var(--gold-line);padding:8px 18px calc(28px + env(safe-area-inset-bottom));
    animation:up .28s cubic-bezier(.2,.8,.2,1);}
  @keyframes up{from{transform:translateY(40px);opacity:.6;}to{transform:none;opacity:1;}}
  .grab{width:42px;height:5px;border-radius:3px;background:var(--muted2);margin:8px auto 16px;opacity:.5;}
  .sheet h3{font-size:19px;margin:0 0 2px;}
  .sheet .h-sub{color:var(--muted);font-size:13px;margin-bottom:16px;}
  .kv{display:grid;grid-template-columns:96px 1fr;gap:7px 12px;font-size:14px;margin-bottom:18px;}
  .kv .k{color:var(--muted);font-size:13px;}
  .kv .v{color:var(--txt);word-break:break-word;}
  .kv .v a{font-weight:600;}
  .sec-t{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);
    margin:20px 0 10px;font-weight:700;border-top:1px solid var(--line);padding-top:16px;}
  .stufe-pick{display:flex;flex-wrap:wrap;gap:7px;}
  .stufe-pick .chip{background:var(--card);}
  .row2{display:flex;gap:10px;}
  .row2>*{flex:1;}
  .field{width:100%;padding:11px 12px;background:var(--card);border:1px solid var(--line);
    border-radius:10px;color:var(--txt);outline:none;margin-bottom:10px;}
  .field:focus{border-color:var(--gold-line);}
  textarea.field{resize:vertical;min-height:62px;}
  .btn-sm{padding:11px 16px;border-radius:10px;font-weight:700;font-size:14px;
    background:var(--gold-soft);color:var(--gold);border:1px solid var(--gold-line);}
  .btn-gold{background:linear-gradient(135deg,#d8b96e,#b8954d);color:#0a0e14;border:none;}

  .timeline{display:flex;flex-direction:column;gap:10px;}
  .tl-item{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;}
  .tl-item .th{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:var(--muted);margin-bottom:3px;}
  .tl-item .tt2{font-weight:700;color:var(--gold);text-transform:capitalize;}
  .task-item{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:11px;padding:11px 13px;}
  .task-item.over{border-color:rgba(255,93,93,.4);}
  .task-item .tx{flex:1;font-size:14px;}
  .task-item .dt{font-size:12px;color:var(--muted);}
  .task-item.over .dt{color:var(--bad);font-weight:700;}
  .check{width:30px;height:30px;border-radius:8px;border:1px solid var(--gold-line);background:var(--gold-soft);
    color:var(--gold);font-size:15px;display:flex;align-items:center;justify-content:center;}

  /* ── Bottom nav ── */
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;justify-content:center;
    background:rgba(7,10,15,.9);backdrop-filter:blur(16px);border-top:1px solid var(--line);
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));}
  .nav-inner{display:flex;width:100%;max-width:680px;}
  .nav button{flex:1;background:transparent;color:var(--muted2);display:flex;flex-direction:column;
    align-items:center;gap:3px;font-size:10.5px;font-weight:600;padding:4px 0;letter-spacing:.2px;}
  .nav button .ic{font-size:20px;line-height:1;}
  .nav button.on{color:var(--gold);}
  .nav button.on .ic{filter:drop-shadow(0 0 8px rgba(201,169,97,.5));}

  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:90;
    background:var(--card2);border:1px solid var(--gold-line);color:var(--txt);
    padding:11px 18px;border-radius:50px;font-size:13.5px;font-weight:600;box-shadow:0 12px 40px rgba(0,0,0,.5);
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  .soon{text-align:center;padding:60px 24px;color:var(--muted);}
  .soon .ic{font-size:46px;opacity:.6;}
  .soon h3{margin:14px 0 6px;color:var(--txt);}

  /* ── 4 Säulen ── */
  .pillar{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:12px;position:relative;overflow:hidden;}
  .pillar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),transparent);}
  .pillar .ph{display:flex;align-items:center;gap:10px;margin-bottom:3px;}
  .pillar .nr{font:700 11px Georgia,serif;color:var(--gold);border:1px solid var(--gold-line);border-radius:7px;padding:2px 7px;background:var(--gold-soft);letter-spacing:.5px;}
  .pillar .pn{font-weight:800;font-size:16px;flex:1;letter-spacing:.2px;}
  .pillar .ptag{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .pillar .pkpi{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .pkpi .cell{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:9px 11px;}
  .pkpi .cell .kk{font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted2);}
  .pkpi .cell .vv{font-size:19px;font-weight:800;margin-top:2px;letter-spacing:-.3px;}
  .pkpi .cell .vv.gold{color:var(--gold);} .pkpi .cell .vv.ok{color:var(--ok);} .pkpi .cell .vv.warn{color:var(--warn);} .pkpi .cell .vv.bad{color:var(--bad);}
  .pillar .phint{font-size:11.5px;color:var(--muted2);margin-top:11px;border-top:1px solid var(--line);padding-top:9px;line-height:1.45;}
  .st-badge{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:3px 9px;border-radius:50px;}
  .st-aktiv{background:rgba(62,207,142,.16);color:var(--ok);}
  .st-aufbau{background:rgba(245,185,66,.16);color:var(--warn);}
  .st-geplant{background:rgba(90,167,255,.14);color:var(--info);}

  /* ── Jarvis (Sprach-Assistent) ── */
  .jbtn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    background:linear-gradient(135deg,rgba(201,169,97,.18),rgba(201,169,97,.06));
    border:1px solid var(--gold-line);border-radius:16px;padding:15px 16px;color:var(--txt);}
  .jbtn .orb{width:42px;height:42px;border-radius:50%;flex:0 0 auto;
    background:radial-gradient(circle at 35% 30%,#f0d089,#b8954d 70%);
    box-shadow:0 0 18px rgba(201,169,97,.55);}
  .jbtn .jt{display:block;font-weight:800;font-size:16px;letter-spacing:.3px;}
  .jbtn .jd{display:block;font-size:12px;color:var(--muted);margin-top:2px;line-height:1.35;}
  .jwrap{display:flex;flex-direction:column;min-height:calc(100vh - 230px);}
  .jhero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:10px 0 14px;}
  .jorb{width:84px;height:84px;border-radius:50%;margin-bottom:10px;
    background:radial-gradient(circle at 35% 30%,#f0d089,#b8954d 72%);
    box-shadow:0 0 0 0 rgba(201,169,97,.5);transition:box-shadow .2s;}
  .jorb.idle{animation:jpulse 2.6s ease-in-out infinite;}
  .jorb.think{animation:jspin 1s linear infinite;background:conic-gradient(#b8954d,#f0d089,#b8954d);}
  .jorb.speak{animation:jspeak .7s ease-in-out infinite;}
  @keyframes jpulse{0%,100%{box-shadow:0 0 22px 2px rgba(201,169,97,.35);}50%{box-shadow:0 0 34px 8px rgba(201,169,97,.6);}}
  @keyframes jspin{to{transform:rotate(360deg);}}
  @keyframes jspeak{0%,100%{transform:scale(1);}50%{transform:scale(1.12);box-shadow:0 0 36px 10px rgba(201,169,97,.7);}}
  .jstate{font-size:12px;color:var(--muted);min-height:16px;letter-spacing:.3px;}
  .jq-title{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:2px 2px 8px;}
  /* Schnellbefehle als sichtbares 2-Spalten-Raster (alle auf einen Blick, kein Scrollen). */
  .jchips{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 0 14px;}
  .jchip{display:flex;align-items:center;gap:8px;text-align:left;background:var(--card);
    border:1px solid var(--gold-line);border-radius:14px;padding:12px 13px;font-size:12.5px;
    color:var(--txt);font-weight:600;line-height:1.25;min-height:52px;}
  .jchip:active{background:var(--card2);border-color:var(--gold);}
  .jchip .qi{font-size:18px;flex:0 0 auto;}
  .jconv{flex:1;display:flex;flex-direction:column;gap:10px;padding:6px 0 12px;}
  .jbub{max-width:86%;padding:11px 14px;border-radius:16px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;}
  .jbub.me{align-self:flex-end;background:var(--gold-soft);border:1px solid var(--gold-line);color:var(--txt);border-bottom-right-radius:5px;}
  .jbub.jv{align-self:flex-start;background:var(--card);border:1px solid var(--line);border-bottom-left-radius:5px;}
  .jbub.jv .who{display:block;font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:3px;}
  .jbar{display:flex;gap:9px;align-items:flex-end;padding:12px 0 4px;margin-top:auto;}
  .jbar textarea{flex:1;resize:none;max-height:120px;min-height:46px;padding:12px 14px;background:var(--card);
    border:1px solid var(--line);border-radius:14px;color:var(--txt);outline:none;}
  .jbar textarea:focus{border-color:var(--gold-line);}
  .jmic,.jsend{width:46px;height:46px;flex:0 0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
  .jmic{background:var(--card);border:1px solid var(--gold-line);color:var(--gold);}
  .jmic.rec{background:var(--bad);color:#fff;border-color:var(--bad);animation:jpulse 1s infinite;}
  .jsend{background:linear-gradient(135deg,#d8b96e,#b8954d);color:#0a0e14;border:none;}
  .jspeak-toggle{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;justify-content:center;padding:2px 0 6px;}
  .jdots{display:inline-block;}
  .jdots::after{content:'';animation:jdotsa 1.2s steps(4,end) infinite;}
  @keyframes jdotsa{0%{content:'';}25%{content:'.';}50%{content:'..';}75%{content:'...';}}

  /* ── Command Center „MASTER GEORGE" ── */
  .cc-hero{position:relative;text-align:center;padding:30px 18px 24px;margin-bottom:18px;border-radius:24px;overflow:hidden;cursor:pointer;
    background:
      radial-gradient(130% 90% at 50% -10%, rgba(201,169,97,.16), transparent 62%),
      linear-gradient(165deg,var(--card2),var(--card));
    border:1px solid var(--gold-line);box-shadow:0 18px 50px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.04);}
  .cc-hero::before{content:'';position:absolute;left:-40%;top:0;width:50%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(201,169,97,.10),transparent);
    transform:skewX(-18deg);animation:ccsweep 5.5s ease-in-out infinite;}
  @keyframes ccsweep{0%{left:-50%;}55%,100%{left:140%;}}
  .cc-hero:active{transform:scale(.992);}
  .cc-orb{position:relative;width:96px;height:96px;margin:0 auto 16px;}
  .cc-orb .ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--gold-line);animation:ccspin 9s linear infinite;}
  .cc-orb .ring::after{content:'';position:absolute;top:-3px;left:calc(50% - 4px);width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px 2px var(--gold);}

  /* Titel als SVG → skaliert exakt auf die verfügbare Breite, kann auf KEINEM

  .cc-meta .live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:ccblink 1.6s ease-in-out infinite;}

  .cc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:18px;}

  .cc-tile .ccs{font-size:11px;color:var(--muted2);margin-top:3px;}

  .cc-sec{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:700;margin:6px 2px 11px;display:flex;align-items:center;gap:8px;}

  /* Umsatz-Mini-Chart */

  /* Bob Wake-Word */

  .wsw{position:relative;width:50px;height:28px;border-radius:50px;background:var(--bg2);

  .cc-weather{background:var(--card);border:1px solid var(--gold-line);border-radius:14px;

  @keyframes ccFadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  <div class="topbar">
    <div class="crest-sm">GS</div>
    <div class="tt">Cockpit<small id="tb-sub">Master</small></div>
    <div class="sp"></div>
    <div class="who" id="tb-who"></div>
    <button class="logout" id="tb-logout">Logout</button>
  </div>
  <div id="view" class="view"></div>
  <nav class="nav"><div class="nav-inner" id="nav"></div></nav>
</div>

<div id="toast" class="toast"></div>

<script>
"use strict";
// ── State ──
var TOKEN = null, USER = null, ROLE = null;
var dash = null, leadsCache = [], custCache = [];
var leadFilter = { stufe:'', quelle:'' };
var STUFEN = ['neu','kontaktiert','angebot','gewonnen','verloren'];
var MASTER_UID = 'ee46a716-7017-4045-9f67-fe06d05171e7';
// Cockpit-Zugang NUR für die Master/Admin-UUID. Die Server-API (api/cockpit.js)
// erzwingt dieselbe Regel hart (403) — dies hier ist nur die UI-Spiegelung.
function isMaster(d){ return d && d.user && d.user.id===MASTER_UID && (d.role==='master'||d.role==='gs_admin'); }

// ── Helpers ──
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},2200); }
function deDate(iso){ if(!iso) return '—'; try{ return new Date(iso).toLocaleDateString('de-CH',{day:'2-digit',month:'2-digit',year:'2-digit'}); }catch(e){ return iso; } }
// Datum + Uhrzeit (für letzten Login / letzte Passwortänderung im Account-Status).
function fmtDT(iso){ if(!iso) return '—'; try{ return new Date(iso).toLocaleString('de-CH',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(e){ return iso; } }
function deDateTime(iso){ if(!iso) return '—'; try{ return new Date(iso).toLocaleString('de-CH',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(e){ return iso; } }
function chf(n){ return 'CHF ' + (Number(n)||0).toLocaleString('de-CH'); }
function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }

// ── API ──
function authApi(action, extra){
  return fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.assign({action:action},extra||{}))}).then(function(r){return r.json();});
}
function api(action, params){
  return fetch('/api/cockpit',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.assign({token:TOKEN,action:action},params||{}))})
  .then(function(r){
    if(r.status===403){ handleForbidden(); throw new Error('forbidden'); }
    return r.json();
  });
}
function handleForbidden(){
  // Token abgelaufen? Einmal Refresh versuchen, sonst Logout.
  var rt=null; try{ rt=localStorage.getItem('bob_refresh'); }catch(e){}
  if(rt && !handleForbidden._tried){
    handleForbidden._tried=true;
    authApi('refresh',{refresh_token:rt}).then(function(d){
      if(d && d.access_token && d.user && d.user.id===MASTER_UID){
        handleForbidden._tried=false;  // erlaubt erneuten Refresh nach Ablauf
        setSession(d.access_token, d.refresh_token, d.user, d.role); router();
      } else logout();
    }).catch(logout);
  } else { logout(); }
}

// ── Session ──
function setSession(token, refresh, user, role){
  TOKEN=token; USER=user||USER; ROLE=role;
  try{ localStorage.setItem('bob_auth_token',token); if(refresh) localStorage.setItem('bob_refresh',refresh); }catch(e){}
}
function logout(){
  TOKEN=null; ROLE=null; USER=null;
  try{ localStorage.removeItem('bob_auth_token'); localStorage.removeItem('bob_refresh'); }catch(e){}
  $('app').classList.add('hidden'); $('login').classList.remove('hidden');
}

// ── Auth boot ──
function boot(){
  // 1. Magic-link / recovery callback in hash (#access_token=…)
  if(location.hash && location.hash.indexOf('access_token=')>-1){
    var p={}; location.hash.substring(1).split('&').forEach(function(kv){var a=kv.split('=');p[a[0]]=decodeURIComponent(a[1]||'');});
    if(p.access_token){
      if(p.refresh_token){ try{localStorage.setItem('bob_refresh',p.refresh_token);}catch(e){} }
      history.replaceState(null,'',location.pathname);
      verifyAndEnter(p.access_token, p.refresh_token); return;
    }
  }
  // 2. Existing session
  var t=null; try{ t=localStorage.getItem('bob_auth_token'); }catch(e){}
  if(t){ verifyAndEnter(t); return; }
  // 3. Show login
  $('login').classList.remove('hidden');
}

function verifyAndEnter(token, refresh){
  authApi('verify',{token:token}).then(function(d){
    if(d.error || !d.user){ logout(); return; }
    if(!isMaster(d)){
      // Eingeloggt, aber nicht die Master-UUID → kein Cockpit-Zugang. Kein Leak.
      logout();
      $('login').classList.remove('hidden');
      $('li-msg').className='login-msg err';
      $('li-msg').textContent='Dieser Account hat keinen Zugriff auf das Cockpit.';
      return;
    }
    setSession(token, refresh, d.user, d.role);
    enterApp();
  }).catch(function(){ logout(); });
}

function enterApp(){
  $('login').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('tb-who').textContent = (USER&&USER.email)||'';
  $('tb-sub').textContent = ROLE==='master'?'Master':'Admin';
  buildNav();
  go('dashboard');
  maybeShowInstall();
}

// ── Login handlers ──
$('li-go').onclick=function(){
  var email=$('li-email').value.trim(), pw=$('li-pw').value;
  if(!email||!pw){ setMsg('E-Mail und Passwort eingeben','err'); return; }
  setMsg('Anmelden…','');
  authApi('login',{email:email,password:pw}).then(function(d){
    if(d.error){ setMsg(d.error,'err'); return; }
    if(!isMaster(d)){ setMsg('Kein Zugriff auf das Cockpit.','err'); return; }
    setSession(d.access_token, d.refresh_token, d.user, d.role);
    enterApp();
  }).catch(function(){ setMsg('Verbindungsfehler','err'); });
};
// Magic-Link & Reset landen EXAKT wieder im Cockpit (nicht auf /app).
var COCKPIT_URL = location.origin + '/gs-intern-7k2x';
$('li-magic').onclick=function(){
  var email=$('li-email').value.trim();
  if(!email){ setMsg('Zuerst E-Mail eingeben','err'); return; }
  setMsg('Sende Magic-Link…','');
  authApi('magic_link',{email:email, redirect_to:COCKPIT_URL}).then(function(d){
    setMsg(d.error?d.error:'Link gesendet – E-Mail prüfen, dann landest du direkt hier.', d.error?'err':'ok');
  }).catch(function(){ setMsg('Verbindungsfehler','err'); });
};
$('li-reset').onclick=function(){
  var email=$('li-email').value.trim();
  if(!email){ setMsg('Zuerst E-Mail eingeben','err'); return; }
  setMsg('Sende Link zum Passwort-Setzen…','');
  authApi('reset_password',{email:email, redirect_to:COCKPIT_URL}).then(function(d){
    setMsg(d.error?d.error:'Link gesendet – E-Mail prüfen, dann landest du direkt hier.', d.error?'err':'ok');
  }).catch(function(){ setMsg('Verbindungsfehler','err'); });
};
$('li-pw').addEventListener('keydown',function(e){ if(e.key==='Enter') $('li-go').click(); });
$('tb-logout').onclick=logout;
function setMsg(m,c){ var e=$('li-msg'); e.textContent=m; e.className='login-msg'+(c?' '+c:''); }

// ── Navigation (erweiterbar) ──
var NAV=[
  {id:'dashboard', ic:'◈', label:'Cockpit'},
  {id:'leads',     ic:'◆', label:'Leads'},
  {id:'crm',       ic:'❖', label:'CRM'},
  {id:'mehr',      ic:'⋯', label:'Mehr'}
];
var curView='dashboard';
function buildNav(){
  $('nav').innerHTML=NAV.map(function(n){
    return '<button data-v="'+n.id+'"><span class="ic">'+n.ic+'</span>'+n.label+'</button>';
  }).join('');
  Array.prototype.forEach.call($('nav').children,function(b){ b.onclick=function(){ go(b.getAttribute('data-v')); }; });
}
var MEHR_VIEWS=['mehr','jarvis','marketing','todos','margen','saeulen','blockaden','users','projekte','lizenz','subanfragen'];
function go(v){
  curView=v;
  // Sub-Module zählen zum "Mehr"-Tab (Nav bleibt dort markiert).
  var navActive = MEHR_VIEWS.indexOf(v)>-1 ? 'mehr' : v;
  Array.prototype.forEach.call($('nav').children,function(b){ b.classList.toggle('on', b.getAttribute('data-v')===navActive); });
  window.scrollTo(0,0);
  if(v==='dashboard') renderDashboard();
  else if(v==='leads') renderLeads();
  else if(v==='crm') renderCRM();
  else if(v==='mehr') renderMehr();
  else if(v==='jarvis') renderJarvis();
  else if(v==='marketing') renderMarketing();
  else if(v==='todos') renderTodos();
  else if(v==='margen') renderMargen();
  else if(v==='saeulen') renderSaeulen();
  else if(v==='blockaden') renderBlockaden();
  else if(v==='users') renderUsers();
  else if(v==='projekte') renderProjekte();
  else if(v==='lizenz') renderLizenz();
  else if(v==='subanfragen') renderSubAnfragen();
}
function router(){ go(curView); }

// ── DASHBOARD ──
function renderDashboard(){
  $('view').innerHTML='<h2><span class="acc">●</span> Übersicht</h2><div class="grid">'+
    skeletons(6)+'</div>';
  api('dashboard').then(function(d){ dash=d; paintDashboard(d); }).catch(function(){});
}
function skeletons(n){ var s=''; for(var i=0;i<n;i++) s+='<div class="tile skeleton"></div>'; return s; }

// ── MASTER GEORGE · Command Center ──
function ccTile(ic,label,val,sub,cls,goView){
  return '<div class="cc-tile'+(goView?' tap" data-go="'+goView+'"':'"')+'>'+
    '<div class="cci">'+ic+'</div>'+
    '<div class="cck">'+label+'</div>'+
    '<div class="ccv '+(cls||'')+' mono">'+val+'</div>'+
    (sub?'<div class="ccs">'+sub+'</div>':'')+'</div>';
}
function paintDashboard(d){
  var fuOver=d.followupUeberfaellig||0, fuToday=d.followupHeute||0, fuTotal=fuToday+fuOver;
  var um=d.umsatzMonat||{present:false};
  var sys=d.system||[];

  // Umsatz-KPIs (ehrlich „—" ohne Daten).
  var umGesV = um.present ? chf(um.gesamt) : '—';
  var umGesS = um.present ? (um.anzahlMonate+' Monate erfasst') : 'noch keine Daten';
  var bestV = (um.present && um.bester) ? chf(um.bester.umsatz) : '—';
  var bestS = (um.present && um.bester) ? esc(um.bester.label) : 'noch keine Daten';

  // System-Status-Zeilen.
  var sysHtml = sys.map(function(s){
    var st = s.state==='on'?'on':(s.state==='warn'?'warn':'off');
    var lbl = s.state==='on'?'Aktiv':(s.state==='warn'?'Bereit':'Aus');
    return '<div class="sysrow"><span class="sd '+st+'"></span>'+
      '<span class="sn">'+esc(s.label)+'</span>'+
      '<span class="sdet">'+esc(s.detail||'')+'</span>'+
      '<span class="sstate '+st+'">'+lbl+'</span></div>';
  }).join('') || '<div class="empty">Keine Module.</div>';

  // Umsatz-Mini-Chart (nur bei echten Daten).
  var chartHtml='';
  if(um.present && um.monate && um.monate.length){
    var mx=1; um.monate.forEach(function(m){ if(m.umsatz>mx) mx=m.umsatz; });
    var bars=um.monate.slice(-12).map(function(m){
      var h=Math.max(3, Math.round(m.umsatz/mx*100));
      return '<div class="cb" title="'+esc(m.label)+': '+chf(m.umsatz)+'">'+
        '<div class="bar" style="height:'+h+'%"></div>'+
        '<div class="bl">'+esc(m.label.split(' ')[0])+'</div></div>';
    }).join('');
    chartHtml='<div class="cc-chart"><div class="ch"><span class="t">Umsatz pro Monat</span>'+
      '<span class="tot">'+chf(um.jahrUmsatz)+' <span style="font-weight:600;color:var(--muted);font-size:11px">'+um.jahr+'</span></span></div>'+
      '<div class="cc-bars">'+bars+'</div></div>';
  }

  // Pipeline pro Stufe + Quellen (echte Detail-Daten, unten).
  var maxS=Math.max(1, d.perStufe.neu, d.perStufe.kontaktiert, d.perStufe.angebot, d.perStufe.gewonnen, d.perStufe.verloren);
  var stufeBars=STUFEN.map(function(s){
    var n=d.perStufe[s]||0;
    return '<div class="sb-row"><span class="lbl">'+cap(s)+'</span>'+
      '<span class="sb-track"><span class="sb-fill" style="width:'+Math.round(n/maxS*100)+'%"></span></span>'+
      '<span class="n">'+n+'</span></div>';
  }).join('');
  var srcChips=Object.keys(d.perQuelle||{}).sort(function(a,b){return d.perQuelle[b]-d.perQuelle[a];})
    .map(function(q){ return '<span class="src-chip">'+esc(cap(q))+'<b>'+d.perQuelle[q]+'</b></span>'; }).join('') || '<span class="src-chip">keine Daten</span>';

  $('view').innerHTML=
    '<div class="cc-hero" id="cc-hero">'+
      '<div class="cc-orb"><span class="ring"></span><span class="ring r2"></span><span class="core">⌬</span></div>'+
      '<svg class="cc-title" width="320" height="43" viewBox="0 0 600 80" preserveAspectRatio="xMidYMid meet" role="img" aria-label="MASTER GEORGE">'+
        '<text x="300" y="61" text-anchor="middle" textLength="572" lengthAdjust="spacingAndGlyphs" '+
        'font-family="Georgia,serif" font-weight="800" font-size="60">MASTER GEORGE</text></svg>'+
      '<div class="cc-subt">COMMAND CENTER</div>'+
      '<div class="cc-meta"><span class="live">Live</span><span id="cc-clock"></span></div>'+
      '<div class="cc-cta">🎙️ Antippen &amp; sprechen</div>'+
    '</div>'+

    '<div class="cc-weather" id="cc-weather" hidden></div>'+

    '<div class="cc-grid">'+
      ccTile('📊','Leads gesamt', d.leadsGesamt, d.leadsOffen+' offen', 'gold', 'leads')+
      ccTile('⏰','Follow-ups', fuTotal, (fuToday+' heute · '+fuOver+' überfällig'), (fuOver?'bad':(fuToday?'gold':'ok')), 'crm')+
      ccTile('📈','Pipeline-Wert', chf(d.pipelineWert), 'geschätzt', 'gold')+
      ccTile('🤝','Kunden', d.kundenGesamt, 'aktiv erfasst')+
      ccTile('💎','Umsatz gesamt', umGesV, umGesS, (um.present?'ok':'muted'))+
      ccTile('🏆','Bester Monat', bestV, bestS, (um.present&&um.bester?'gold':'muted'))+
      ccTile('🏗️','Aktive Projekte', d.projekteAktiv, 'von '+d.projekteGesamt+' gesamt', 'ok', 'projekte')+
      ccTile('🛠️','Techniker frei', d.technikerFrei, 'von '+d.technikerGesamt+' im Pool', 'gold', 'saeulen')+
    '</div>'+

    // Block 9 (Runde 7): Schnellzugriff direkt im Cockpit — Sub-Anfragen (Anzahl offen)
    // + Kapazitäts-Projekte, statt nur unter „Mehr" versteckt.
    '<div class="cc-sec">Schnellzugriff</div>'+
    '<div class="cc-grid">'+
      ccTile('📐','Sub-Anfragen', '<span id="cc-subcount">…</span>', 'offen · kalkulieren & Angebot', 'gold', 'subanfragen')+
      ccTile('🏢','Kapazitäts-Projekte', d.projekteGesamt, 'planen & steuern', 'ok', 'projekte')+
    '</div>'+

    chartHtml+

    '<div class="cc-sec">System-Status</div>'+
    '<div class="cc-sys">'+sysHtml+'</div>'+

    '<div class="cc-sec">Pipeline &amp; Quellen</div>'+
    '<div class="grid">'+
      tileWide('Pipeline pro Stufe','<div class="stufebars">'+stufeBars+'</div>','plain')+
      tileWide('Leads pro Quelle','<div class="src-chips">'+srcChips+'</div>','plain')+
      tileTap('todos','To-Dos heute', (d.todosHeute||0), ((d.todosUeberfaellig||0)? (d.todosUeberfaellig)+' überfällig':'offen: '+(d.todosOffen||0)), (d.todosUeberfaellig? 'bad': (d.todosHeute? 'gold':'')))+
      tileTap('margen','Marge gesamt', chf(d.margeGesamt||0), (d.margeProzent||0)+'% · Umsatz '+chf(d.umsatzGesamt||0), 'ok')+
    '</div>';

  // Hero → Jarvis + direkt Mikrofon aktivieren ("antippen → sprechen").
  var hero=$('cc-hero'); if(hero) hero.onclick=ccActivateJarvis;
  // KPI-Kacheln mit data-go → Modul öffnen.
  Array.prototype.forEach.call($('view').querySelectorAll('.cc-tile[data-go]'),function(c){
    c.onclick=function(){ go(c.getAttribute('data-go')); };
  });
  var tt=$('view').querySelector('[data-tap="todos"]'); if(tt) tt.onclick=function(){ go('todos'); };
  var tm=$('view').querySelector('[data-tap="margen"]'); if(tm) tm.onclick=function(){ go('margen'); };
  startCcClock();
  loadWeather();
  loadSubCount();
}
// Block 9 (Runde 7): Anzahl offener Sub-Anfragen (angefragt + in_pruefung) für die
// Schnellzugriff-Kachel im Cockpit. Fehler unkritisch (Kachel bleibt „–").
function loadSubCount(){
  var el=$('cc-subcount'); if(!el) return;
  api('msub_liste').then(function(d){
    if(!d||d.error){ el.textContent='–'; return; }
    var n=(d.anfragen||[]).filter(function(a){ return a.sub_status==='angefragt'||a.sub_status==='in_pruefung'; }).length;
    el.textContent=n;
  }).catch(function(){ el.textContent='–'; });
}
// ── Wetter (Zürich, Wien, Barcelona) — dezente Zeile im Command Center ──
// Quelle: /api/weather (open-meteo, kein Key). 15-Min-Cache im Browser; Fehler
// sind unkritisch (die Zeile bleibt dann einfach ausgeblendet).
var _wxCache=null, _wxAt=0;
function loadWeather(){
  var el=$('cc-weather'); if(!el) return;
  if(_wxCache && Date.now()-_wxAt<900000){ paintWeather(_wxCache); return; }
  fetch('/api/weather').then(function(r){ return r.json(); })
    .then(function(d){ _wxCache=d; _wxAt=Date.now(); paintWeather(d); })
    .catch(function(){ /* still: Zeile bleibt verborgen */ });
}
function paintWeather(d){
  var el=$('cc-weather'); if(!el) return;
  var cs=(d&&d.cities)||[];
  if(!cs.length){ el.hidden=true; return; }
  el.hidden=false;
  el.innerHTML='<div class="wx-h">Wetter</div><div class="wx-row">'+
    cs.map(function(c){
      return '<div class="wx-city"><span class="wx-ic">'+esc(c.emoji||'🌡️')+'</span>'+
        '<span class="wx-name">'+esc(c.name)+'</span>'+
        '<span class="wx-temp mono">'+esc(String(c.temp))+'°</span>'+
        '<span class="wx-txt">'+esc(c.text||'')+'</span></div>';
    }).join('')+'</div>';
}
// Tap auf "MASTER GEORGE" → Jarvis öffnen und sofort zuhören (im Tap-Kontext,
// damit iOS/Android das Mikrofon erlaubt).
function ccActivateJarvis(){ _jAutoMic=true; go('jarvis'); }
function startCcClock(){
  if(window._ccTimer) clearInterval(window._ccTimer);
  function upd(){
    var e=$('cc-clock'); if(!e){ clearInterval(window._ccTimer); window._ccTimer=null; return; }
    try{ e.textContent=new Date().toLocaleString('de-CH',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(x){}
  }
  upd(); window._ccTimer=setInterval(upd,20000);
}
function tile(k,v,sfx,cls){
  return '<div class="tile"><div class="k">'+k+'</div><div class="v '+(cls||'')+' mono">'+v+
    (sfx?' <span class="sfx">'+sfx+'</span>':'')+'</div></div>';
}
function tileWide(k,inner,mode){
  if(mode==='plain') return '<div class="tile wide"><div class="k">'+k+'</div>'+inner+'</div>';
  return '<div class="tile wide"><div class="k">'+k+'</div><div class="v '+(mode||'')+' mono">'+inner+'</div></div>';
}
// Anklickbare Kachel (führt zu einem Modul).
function tileTap(tap,k,v,sfx,cls){
  return '<div class="tile" data-tap="'+tap+'" style="cursor:pointer"><div class="k">'+k+'</div>'+
    '<div class="v '+(cls||'')+' mono">'+v+'</div>'+(sfx?'<div class="sfx">'+sfx+'</div>':'')+'</div>';
}

// ── LEADS (Block 1) ──
function renderLeads(){
  var stufeChips=['<span class="chip'+(leadFilter.stufe===''?' on':'')+'" data-s="">Alle</span>']
    .concat(STUFEN.map(function(s){ return '<span class="chip'+(leadFilter.stufe===s?' on':'')+'" data-s="'+s+'">'+cap(s)+'</span>'; })).join('');
  $('view').innerHTML=
    '<h2><span class="acc">◆</span> Lead-Koordination</h2>'+
    '<div class="filters" id="lead-filters">'+stufeChips+'</div>'+
    '<div class="list" id="lead-list">'+skeletonCards(4)+'</div>';
  Array.prototype.forEach.call($('lead-filters').children,function(c){
    c.onclick=function(){ leadFilter.stufe=c.getAttribute('data-s'); renderLeads(); };
  });
  api('leads',{stufe:leadFilter.stufe,quelle:leadFilter.quelle}).then(function(d){
    leadsCache=d.leads||[]; paintLeads(leadsCache);
  }).catch(function(){});
}
function skeletonCards(n){ var s=''; for(var i=0;i<n;i++) s+='<div class="skeleton" style="height:84px"></div>'; return s; }
function paintLeads(leads){
  if(!leads.length){ $('lead-list').innerHTML='<div class="empty">Keine Leads in dieser Ansicht.</div>'; return; }
  $('lead-list').innerHTML=leads.map(function(l){
    var fu = l.followup_state ? '<span class="fu '+l.followup_state+'">'+
      (l.followup_state==='ueberfaellig'?'⚠ überfällig':l.followup_state==='heute'?'★ heute':'⏱ '+deDate(l.followup_datum))+'</span>' : '';
    return '<div class="lcard" data-id="'+l.id+'">'+
      '<div class="top"><div class="nm">'+esc(l.kunde_name)+(l.kunde_firma&&l.kunde_firma!==l.kunde_name?' <span style="color:var(--muted);font-weight:500">· '+esc(l.kunde_firma)+'</span>':'')+'</div>'+

    '<button class="check" data-done="'+t.id+'">✓</button>'+

// ── Datei-Upload (Fotos/Pläne) → Storage-Bucket 'projektdateien' ──
function openDateiUpload(kategorie){
  kategorie=(['bilder','plaene','dateien'].indexOf(kategorie)>-1)?kategorie:'dateien';
  var inp=document.createElement('input');
  inp.type='file';
  inp.accept=(kategorie==='bilder')?'image/*':(kategorie==='plaene'?'application/pdf,.dwg,.dxf,image/*':'*/*');
  inp.multiple=true;
  inp.onchange=function(){ var files=Array.prototype.slice.call(inp.files||[]); if(files.length) pmUploadFiles(files,kategorie); };
  inp.click();
}
function pmUploadFiles(files,kategorie){
  toast('Lade '+files.length+' Datei'+(files.length>1?'en':'')+' hoch…');
  var chain=Promise.resolve(), okCount=0, errMsg='';
  files.forEach(function(f){
    chain=chain.then(function(){
      if(f.size>12*1024*1024){ errMsg=f.name+' > 12 MB'; return; }
      return new Promise(function(resolve){
        var rd=new FileReader();
        rd.onload=function(){
          api('pm_datei_upload',{projekt_id:_pmProjektId,kategorie:kategorie,filename:f.name,contentType:f.type||'',data:String(rd.result)})
            .then(function(r){ if(r&&r.ok) okCount++; else if(r&&r.error) errMsg=r.error; resolve(); })
            .catch(function(){ errMsg='Upload fehlgeschlagen'; resolve(); });
        };
        rd.onerror=function(){ errMsg='Datei nicht lesbar'; resolve(); };
        rd.readAsDataURL(f);
      });
    });
  });
  chain.then(function(){ loadProjekt(); toast(okCount?(okCount+' hochgeladen'+(errMsg?' · '+errMsg:'')):(errMsg||'Kein Upload')); });
}
function pmDeleteDatei(path){
  api('pm_datei_del',{projekt_id:_pmProjektId,path:path}).then(function(r){
    if(r&&r.error){ toast(r.error); return; } loadProjekt(); toast('Gelöscht');
  }).catch(function(){ toast('Fehler'); });
}
// PDF-Export eines Abschnitts (Material/Rapporte/Rechnungen) → base64 → Download.
// Nutzt die bestehende PDF-Engine lib/pdf.js serverseitig (kein neuer Renderer).
function pmExportPdf(action){
  toast('Erstelle PDF…');
  api(action,{projekt_id:_pmProjektId}).then(function(d){
    if(!d||!d.pdf_base64){ toast(d&&d.error?d.error:'Export fehlgeschlagen'); return; }
    try{
      var bin=atob(d.pdf_base64), len=bin.length, arr=new Uint8Array(len);
      for(var i=0;i<len;i++) arr[i]=bin.charCodeAt(i);
      var blob=new Blob([arr],{type:'application/pdf'}), url=URL.createObjectURL(blob);
      var a=document.createElement('a'); a.href=url; a.download=d.filename||'export.pdf';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); },4000);
      toast('PDF geladen');
    }catch(e){ toast('Download fehlgeschlagen'); }
  }).catch(function(){ toast('Fehler'); });
}
function pmDel(action,id){ api(action,{id:id}).then(function(d){ if(d&&d.notMigrated){ toast('Noch nicht migriert'); return; } loadProjekt(); }).catch(function(){ toast('Fehler'); }); }

function dbSyncText(){
  var g=function(id){ var el=$(id); return el?el.value:undefined; }, v;
  if((v=g('db-k-firma'))!==undefined)_dbEdit.kunde.firma=v;
  if((v=g('db-k-ap'))!==undefined)_dbEdit.kunde.ansprechperson=v;
  if((v=g('db-k-tel'))!==undefined)_dbEdit.kunde.telefon=v;
  if((v=g('db-k-mail'))!==undefined)_dbEdit.kunde.email=v;
  if((v=g('db-k-obj'))!==undefined)_dbEdit.kunde.objekt=v;
  if((v=g('db-start'))!==undefined)_dbEdit.start=v;
  if((v=g('db-notiz'))!==undefined)_dbEdit.notiz=v;
  Array.prototype.forEach.call(document.querySelectorAll('[data-dbtext]'),function(el){
    var art=el.getAttribute('data-art'), fk=el.getAttribute('data-field');
    if(!_dbEdit.details[art])_dbEdit.details[art]={};
    _dbEdit.details[art][fk]=el.value;
  });
}
function dbRerenderDyn(){ var el=$('db-dyn'); if(el) el.innerHTML=dbDynHtml(); }
function dbAnlageToggle(k){
  dbSyncText();
  var a=_dbEdit.anlagenart, i=a.indexOf(k);
  if(i>-1){ a.splice(i,1); delete _dbEdit.details[k]; } else { a.push(k); if(!_dbEdit.details[k])_dbEdit.details[k]={}; }
  dbRerenderDyn();
}
function dbDetailPick(art,field,val,multi){
  dbSyncText();
  if(!_dbEdit.details[art])_dbEdit.details[art]={};
  if(multi){ var arr=_dbEdit.details[art][field]; if(!Array.isArray(arr))arr=[]; var i=arr.indexOf(val); if(i>-1)arr.splice(i,1); else arr.push(val); _dbEdit.details[art][field]=arr; }
  else { _dbEdit.details[art][field]=(_dbEdit.details[art][field]===val)?'':val; }
  dbRerenderDyn();
}
function dbUmfangToggle(v){ var a=_dbEdit.umfang, i=a.indexOf(v); if(i>-1)a.splice(i,1); else a.push(v); var el=$('db-umfang'); if(el) el.innerHTML=dbChipRow(DB_UMFANG,_dbEdit.umfang,'dbUmfangToggle'); }
function dbMatSet(v){ _dbEdit.materialstellung=(_dbEdit.materialstellung===v)?'':v; var el=$('db-mat'); if(el) el.innerHTML=dbChipRow(DB_MATSTELL,[_dbEdit.materialstellung],'dbMatSet'); }
function dbSave(){

}

// ═══════════════════════════════════════════════════════════════════════════
// ZAHLUNGSSYSTEM (Escrow) — interne Ansicht + Aggregat je Bauabschnitt.
//   Daten via zs_projekt; Aktionen via zs_step_action (liefert frisches Payload).
// ═══════════════════════════════════════════════════════════════════════════
var _zsData=null;
var ZS_PROFILE=[
  {v:'stueck_15_70_15',t:'Stück/Zone 15/70/15'},
  {v:'komplex_15_25_50_10',t:'Komplex-Block 15/25/50/10'},
  {v:'endmontage_30_70',t:'Endmontage 30/70 (letzte=Abnahme)'},
  {v:'klein_pauschal',t:'Klein-Pauschal mit Blockaden'}
];
var ZS_EINHEIT=[
  {v:'zone',t:'Zone'},{v:'giessrahmen',t:'Gießrahmen'},{v:'verteiler',t:'Verteiler'},
  {v:'bad_wc',t:'Bad/WC'},{v:'meilenstein',t:'Meilenstein'},{v:'pauschal',t:'Pauschal'}
];
function zsProfilLabel(v){ for(var i=0;i<ZS_PROFILE.length;i++) if(ZS_PROFILE[i].v===v) return ZS_PROFILE[i].t; return v||'—'; }
function zsEinheitLabel(v){ for(var i=0;i<ZS_EINHEIT.length;i++) if(ZS_EINHEIT[i].v===v) return ZS_EINHEIT[i].t; return v||'—'; }
function zsChf(v){ return 'CHF '+Number(v||0).toLocaleString('de-CH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
// Audit-Zeitstempel: mitJahr=true → "TT.MM.JJJJ, HH:MM", sonst kompakt "TT.MM. HH:MM".
function zsFmt(iso,mitJahr){
  if(!iso) return ''; var d=new Date(iso); if(isNaN(d.getTime())) return '';
  var p=function(n){ return (n<10?'0':'')+n; };
  var tag=p(d.getDate())+'.'+p(d.getMonth()+1)+'.';
  var datum=mitJahr?(tag+d.getFullYear()):tag;
  return datum+(mitJahr?', ':' ')+p(d.getHours())+':'+p(d.getMinutes());
}
function zsAbStatusColor(s){ return ({geplant:'var(--muted)',angezahlt:'var(--gold)',aktiv:'var(--gold)',zwischenfreigabe:'#4aa8ff',abgeschlossen:'#3dd68c',nachtrag:'#e0a341'})[s]||'var(--muted)'; }
function zsStepStatusLabel(s){ return ({wartend:'wartend',aktiv:'aktiv',hinterlegt:'im Escrow',gs_fertig:'in Bestätigung',freigegeben:'freigegeben',offen:'offen',geklaert:'geklärt'})[s]||s; }
function zsStepStatusColor(s){ return ({wartend:'var(--muted2)',aktiv:'var(--gold)',hinterlegt:'#4aa8ff',gs_fertig:'#e0a341',freigegeben:'#3dd68c',offen:'var(--gold)',geklaert:'#3dd68c'})[s]||'var(--muted)'; }

function zsLoad(pid){
  api('zs_projekt',{projekt_id:pid}).then(function(d){
    var box=$('zs-box'); if(!box) return;
    if(d && d.notMigrated){ box.innerHTML=migRow('Zahlungssystem-Tabellen noch nicht migriert.'); return; }
    if(!d || d.error){ box.innerHTML='<div class="empty" style="padding:12px">'+esc((d&&d.error)||'Ladefehler')+'</div>'; return; }
    _zsData=d; zsRender(d);
  }).catch(function(){ var box=$('zs-box'); if(box) box.innerHTML='<div class="empty" style="padding:12px">Ladefehler Zahlungssystem</div>'; });
}
function zsRender(d){
  var box=$('zs-box'); if(!box) return;
  var abs=(d&&d.abschnitte)||[];
  if(!abs.length){ box.innerHTML='<div class="empty" style="padding:12px">Noch kein Bauabschnitt. Über „＋ Bauabschnitt" anlegen – die Zahlungs-/Blockaden-Kette wird automatisch generiert.</div>'; return; }
  // Gesamtübersicht GANZ OBEN, darunter die Abschnitts-Karten. Gleiche Datenquelle,
  // daher automatisch aktuell bei jeder Freigabe/Neuanlage (zsLoad → zsRender).
  box.innerHTML=zsUebersichtHtml(abs)+abs.map(zsAbschnittHtml).join('');
}
// ── Projektweite Gesamtübersicht (rein aus d.abschnitte summiert) ──
function zsUebersichtHtml(abs){
  var vol=0, freig=0, nZahl=0, nBlock=0, next=null;
  abs.forEach(function(a){
    vol+=Number(a.gesamtbetrag||0);
    freig+=Number((a.aggregat&&a.aggregat.freigegeben)||0);
    (a.steps||[]).forEach(function(s){
      if(s.typ==='zahlung'){ nZahl++; if(!next && s.status!=='freigegeben') next={bez:s.bezeichnung,ab:a.name}; }
      else if(s.typ==='blockade'){ nBlock++; }
    });
  });
  var offen=Math.max(0,vol-freig);
  var pct=vol>0?Math.round(freig/vol*100):0;
  var nextHtml=next
    ? '▸ Nächster offener Schritt: '+esc(next.bez)+' <span style="color:var(--muted2)">('+esc(next.ab)+')</span>'
    : '✓ Alle Zahlungen freigegeben';
  var rows=abs.map(function(a){
    var ap=(a.aggregat&&a.aggregat.prozent)||0, col=zsAbStatusColor(a.status);
    return '<div class="zs-ov-row">'+
      '<span class="zs-ov-dot" style="background:'+col+'"></span>'+
      '<span class="zs-ov-nm">'+esc(a.name)+'</span>'+
      '<span class="zs-ov-pct" style="color:'+col+'">'+ap+'%</span>'+
      '<span class="zs-ov-betr">'+zsChf(a.gesamtbetrag)+'</span>'+
      pmPill(a.status||'—',col)+'</div>';
  }).join('');
  return '<div class="zs-ov">'+
    '<div class="zs-ov-head"><div>'+
      '<div class="zs-ov-vol">'+zsChf(vol)+'</div>'+
      '<div class="zs-ov-sub">Auftragsvolumen · '+abs.length+' Bauabschnitt'+(abs.length!==1?'e':'')+'</div></div>'+
      '<div class="zs-ov-badge">'+pct+'%</div></div>'+
    '<div class="zs-bar"><div class="zs-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="zs-ov-line"><span class="zs-ov-ok">'+zsChf(freig)+' freigegeben</span><span class="zs-ov-mut">'+zsChf(offen)+' offen</span></div>'+
    '<div class="zs-ov-stats">'+nZahl+' Zahlungs-Step'+(nZahl!==1?'s':'')+' · '+nBlock+' Blockade'+(nBlock!==1?'n':'')+'</div>'+
    '<div class="zs-next" style="margin-top:6px">'+nextHtml+'</div>'+
    '<div class="zs-ov-rows">'+rows+'</div>'+
  '</div>';
}
function zsAbschnittHtml(a){
  var agg=a.aggregat||{}, pct=agg.prozent||0;
  var head='<div class="zs-ab-head"><div><strong>'+esc(a.name)+'</strong> '+pmPill(a.status||'—',zsAbStatusColor(a.status))+
    '<div class="zs-ab-meta">'+esc(zsEinheitLabel(a.einheit_typ))+' ×'+esc(a.einheit_anzahl)+' · '+zsChf(a.gesamtbetrag)+' · '+esc(zsProfilLabel(a.split_profil))+'</div></div>'+
    '<div style="display:flex;gap:4px">'+
      '<button class="chip" style="font-size:11px" onclick="zsAbschnittForm(\''+a.id+'\')">✏️</button>'+
      '<button class="chip" style="font-size:11px" onclick="zsRegen(\''+a.id+'\')">↻ neu</button>'+
      '<button class="chip" style="font-size:11px" onclick="zsDel(\''+a.id+'\')">×</button></div></div>';
  var next=agg.naechster?('▸ Nächster Schritt: '+esc(agg.naechster.bezeichnung)):'✓ Alle Schritte abgeschlossen';
  var aggBlock='<div class="zs-agg"><div class="zs-bar"><div class="zs-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="zs-agg-line"><span>'+pct+'% freigegeben</span><span>'+zsChf(agg.freigegeben)+' / '+zsChf(agg.total)+'</span></div>'+
    '<div class="zs-next">'+next+'</div></div>';
  var steps='<div class="zs-steps">'+(a.steps||[]).map(zsStepHtml).join('')+'</div>';
  return '<div class="zs-ab">'+head+aggBlock+steps+'</div>';
}
function zsStepHtml(s){
  var icon=s.typ==='blockade'?'⛔':'💰';
  var betr=s.typ==='zahlung'?('<span class="zs-betr">'+zsChf(s.betrag)+'</span>'):'';
  var pill=pmPill(zsStepStatusLabel(s.status),zsStepStatusColor(s.status));
  var escLine='';
  if(s.typ==='zahlung'){
    var parts=[];
    if(s.escrow_status) parts.push('Escrow: '+esc(s.escrow_status));
    if(s.gs_bestaetigt) parts.push('GS ✓');
    if(s.kunde_bestaetigt) parts.push('Kunde ✓');
    if(s.rueckbehalt_prozent>0) parts.push('Rückbehalt '+esc(s.rueckbehalt_prozent)+'%');
    if(s.stripe_transfer_id) parts.push(esc(s.stripe_transfer_id));
    else if(s.stripe_payment_intent_id) parts.push(esc(s.stripe_payment_intent_id));
    if(parts.length) escLine='<div class="zs-esc">'+parts.join(' · ')+'</div>';
  }
  // Audit-Trail: Zeitstempel der Freigabe + Doppelbestätigung (nur Anzeige).
  var timeLine='';
  if(s.typ==='zahlung'){
    var tl=[];
    if(s.freigegeben_at) tl.push('<div class="zs-time zs-time-ok">✓ Freigegeben: '+esc(zsFmt(s.freigegeben_at,true))+'</div>');
    var conf=[];
    if(s.gs_bestaetigt_at) conf.push('GS best. '+esc(zsFmt(s.gs_bestaetigt_at,false)));
    if(s.kunde_bestaetigt_at) conf.push('Kunde best. '+esc(zsFmt(s.kunde_bestaetigt_at,false)));
    if(conf.length) tl.push('<div class="zs-time">'+conf.join(' · ')+'</div>');
    timeLine=tl.join('');
  }
  return '<div class="zs-step"><div class="zs-step-h"><span class="zs-no">'+esc(s.reihenfolge)+'</span><span class="zs-ic">'+icon+'</span>'+
    '<span class="zs-bez">'+esc(s.bezeichnung)+'</span>'+betr+pill+'</div>'+escLine+timeLine+zsStepBtns(s)+'</div>';
}
function zsStepBtns(s){
  var b=[];
  function btn(op,label){ return '<button class="chip zs-op" onclick="zsAct(\''+s.id+'\',\''+op+'\')">'+esc(label)+'</button>'; }
  if(s.typ==='blockade' && s.status==='offen') b.push(btn('blockade_freigeben','✓ freigeben'));
  if(s.typ==='zahlung'){
    if(s.status==='aktiv') b.push(btn('hinterlegen','💳 hinterlegen'));
    else if(s.status==='hinterlegt'||s.status==='gs_fertig'){
      if(!s.gs_bestaetigt) b.push(btn('gs_fertig','GS fertig'));
      if(!s.kunde_bestaetigt) b.push(btn('kunde_fertig','Kunde fertig'));
      if(s.gs_bestaetigt && s.kunde_bestaetigt) b.push(btn('freigeben','💰 freigeben'));
    }
  }
  return b.length?'<div class="zs-btns">'+b.join('')+'</div>':'';
}
function zsAct(stepId,op){
  api('zs_step_action',{step_id:stepId,op:op}).then(function(d){
    if(d && d.error){ toast(d.error); return; }
    if(d && d.notMigrated){ toast('Nicht migriert'); return; }
    _zsData=d; zsRender(d); toast('Aktualisiert');
  }).catch(function(){ toast('Aktion fehlgeschlagen'); });
}
function zsRegen(id){
  if(!confirm('Kette neu berechnen? Überschreibt den bisherigen Zahlungs-Fortschritt dieses Abschnitts.')) return;
  api('zs_abschnitt_save',{id:id,regenerate:true}).then(function(d){
    if(d && d.error){ toast(d.error); return; }
    zsLoad(_pmProjektId); toast('Kette neu generiert');
  }).catch(function(){ toast('Fehler'); });
}
function zsDel(id){
  if(!confirm('Bauabschnitt inkl. Kette und Escrow löschen?')) return;
  api('zs_abschnitt_del',{id:id}).then(function(d){
    if(d && d.error){ toast(d.error); return; }
    zsLoad(_pmProjektId); toast('Gelöscht');
  }).catch(function(){ toast('Fehler'); });
}
function zsAbschnittForm(id){
  var a=null;

// Liest alle DOM-Eingaben zurück in _pl (vor jeder strukturellen Änderung / bei Re-Render).
function plReadInputs(){

    a.steps.forEach(function(s,si){
      var n=$('pl-sn-'+ai+'-'+si),b=$('pl-sb-'+ai+'-'+si);
      if(n)s.bezeichnung=n.value; if(b&&s.typ==='zahlung')s.betrag=Number(b.value)||0;
    });
  });

// ═══ KALKULATIONSGENERATOR (INTERN, nur Master, nur Sub) ═══
function kalkCalc(inp,s){
  s=s||{}; var stundenProTag=Number(s.stunden_pro_team_tag||8)||8;
  var personen=Math.max(1,(parseInt(inp.personen,10)||2));
  var teamTage=Math.max(0,Number(inp.team_tage||0));
  var modus=(inp.ansatz_modus==='schnell'||inp.ansatz_modus==='schmerzgrenze')?inp.ansatz_modus:'detailliert';
  var ansatz=modus==='schnell'?Number(s.ansatz_schnell||85):(modus==='schmerzgrenze'?Number(s.ansatz_minimum||75):Number(s.ansatz_detailliert||90));
  var v=teamTage*personen*stundenProTag, umsatz=v*ansatz;
  var kosten=(v*Number(s.vollkosten_chf_h||46))+(teamTage*personen*Number(s.spesen_pro_person_tag||40))+(teamTage*Number(s.kfz_pauschale_tag||20))+((teamTage/5)*Number(s.equipment_pro_woche||280));
  var rg=umsatz-kosten, dbh=v>0?rg/v:0, eff=v>0?(rg/v)+Number(s.vollkosten_chf_h||46):0;
  // Block 8 (Runde 7): 0 Team-Tage → neutral/grau (noch nichts berechnet), nicht rot.
  var ampel=(teamTage<=0||v<=0)?'grau':(eff>=Number(s.ampel_gruen_ab||70)?'gruen':(eff>=Number(s.ampel_rot_unter||56)?'gelb':'rot'));
  var r2=function(x){return Math.round(x*100)/100;};
  return {personen:personen,team_tage:r2(teamTage),ansatz_modus:modus,ansatz:r2(ansatz),verrechnungsstunden:r2(v),umsatz:r2(umsatz),kosten:r2(kosten),rohgewinn:r2(rg),db_pro_stunde:r2(dbh),eff_chf_h:r2(eff),ampel:ampel};
}

  // Block 4 (Runde 7): Löschen nur solange kein Angebot ABGESCHICKT (Entwurf/abgelehnt ok).
  var _ang=_subBundle&&_subBundle.angebot;
  var gesendet=_ang&&(_ang.status==='abgeschickt'||_ang.status==='besprechung'||_ang.status==='angenommen');
  var rows=pos.length?pos.map(function(k){

  var netto=_angPos.reduce(function(s,p){return s+Number(p.menge||0)*Number(p.einzelpreis||0);},0);
  var nz=netto*(1-Number(_angMeta.rabatt||0)/100)*(1+Number(_angMeta.zuschlag||0)/100);
  var mw=nz*Number(_angMeta.mwst||0)/100; var r2=function(x){return Math.round(x*100)/100;};
  return {netto:r2(netto),zwischensumme:r2(nz),mwst:r2(mw),brutto:r2(nz+mw)};
}

// ════ KUNDEN & LIZENZEN — Feature-Freischaltung pro Partner-Account (Backend) ════
// Admin schaltet pro Partner einzelne Features frei → /api/entitlements (Master-Token,
// gs_admin-gated). Serverseitig durchgesetzt in api/projekte|tagesrapport|blockaden.
// Ersetzt die frühere localStorage-Demo: jetzt echt & persistent.
function entApi(body){
  return fetch('/api/entitlements',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
    body:JSON.stringify(body||{})}).then(function(r){ return r.json().catch(function(){return {};}); });
}
var _lizFeatures=[], _lizPartners=[], _lizPartnerId='', _lizTableMissing=false;
function renderLizenz(){
  $('view').innerHTML='<h2><span class="acc">🔑</span> Kunden & Lizenzen</h2>'+backRow()+
    '<button class="btn btn-gold" id="liz-new" style="margin-bottom:14px">＋ Partner anlegen</button>'+
    '<div class="empty" id="liz-body" style="border:none;background:none;padding:0">Lädt…</div>';
  wireBack();
  $('liz-new').onclick=openCreateUser;   // wiederverwendet die bestehende User-Anlage
  entApi({action:'list'}).then(function(d){
    var b=$('liz-body'); if(!b) return;
    if(d.error){ b.innerHTML='<div class="empty">'+esc(d.error)+'</div>'; return; }
    _lizFeatures=d.features||[]; _lizPartners=d.partners||[]; _lizTableMissing=!!d.tableMissing;
    if((!_lizPartnerId||!lizPartner())&&_lizPartners.length) _lizPartnerId=_lizPartners[0].user_id;
    paintLizenz();
  }).catch(function(){ var b=$('liz-body'); if(b) b.innerHTML='<div class="empty">Verbindungsfehler.</div>'; });
}
function lizPartner(){ for(var i=0;i<_lizPartners.length;i++){ if(_lizPartners[i].user_id===_lizPartnerId) return _lizPartners[i]; } return null; }
function paintLizenz(){
  var body=$('liz-body'); if(!body) return;
  if(!_lizPartners.length){ body.innerHTML='<div class="empty">Noch keine Partner-Accounts. Lege oben einen Partner an.</div>'; return; }
  var p=lizPartner(); if(!p){ p=_lizPartners[0]; _lizPartnerId=p.user_id; }
  var ent=p.entitlements||{};
  var opts=_lizPartners.map(function(x){ return {v:x.user_id,t:(x.firma||x.name||x.email||'Partner')}; });
  var frei=_lizFeatures.filter(function(f){ return ent[f.key]; }).length;
  var warn=_lizTableMissing?'<div class="empty" style="padding:12px;font-size:12.5px;margin-bottom:12px">Tabelle noch nicht angelegt – Freischaltungen greifen erst nach <b>scripts/entitlements.sql</b> in Supabase. Bis dahin sind vorübergehend alle Features frei.</div>':'';
  body.innerHTML=warn+
    '<div class="sec-t" style="margin-top:0">Kunde (Partner-Account)</div>'+pmSelect('liz-partner',opts,_lizPartnerId)+
    '<div class="meta" style="margin:12px 0"><span style="color:var(--muted)">'+esc(p.email||'')+'</span>'+
      '<span class="dot">Freigeschaltet:</span> '+pmPill(frei+' von '+_lizFeatures.length,'var(--gold)')+'</div>'+
    '<div class="meta" style="margin:-4px 0 12px"><span style="color:var(--muted2);font-size:11px">Account-ID: '+esc(p.user_id||'—')+' · muss im Partner unter ⚙️→Freischaltungen identisch sein</span></div>'+
    '<div class="list">'+_lizFeatures.map(function(f){
      var on=!!ent[f.key];
      return '<div class="lcard" style="opacity:'+(on?'1':'.6')+'"><div class="top">'+
        '<div class="nm">'+esc(f.label)+'</div>'+
        '<button class="chip'+(on?' on':'')+'" data-feat="'+esc(f.key)+'" style="font-size:12px">'+(on?'✓ frei':'freischalten')+'</button></div>'+
        '<div class="meta"><span style="color:var(--muted2)">'+esc(f.key)+'</span></div></div>';
    }).join('')+'</div>';
  $('liz-partner').onchange=function(){ _lizPartnerId=$('liz-partner').value; paintLizenz(); };
  Array.prototype.forEach.call(body.querySelectorAll('[data-feat]'),function(btn){
    btn.onclick=function(){ lizToggle(btn.getAttribute('data-feat')); };
  });
}
function lizToggle(key){
  var p=lizPartner(); if(!p) return;
  var ent=p.entitlements||(p.entitlements={});
  var next=!ent[key];
  ent[key]=next; paintLizenz();      // optimistisch, rollt bei Fehler zurück
  entApi({action:'set',partner_user_id:p.user_id,feature_key:key,enabled:next}).then(function(d){
    if(d.error){ ent[key]=!next; paintLizenz(); toast(d.error); return; }
    // DB-Wahrheit gegenlesen: frisch die Matrix neu laden und den Zustand aus der
    // Tabelle übernehmen. So fliegt ein stiller Write-Fehler sofort auf (Toggle
    // springt zurück), statt fälschlich „frei" zu zeigen.
    var pid=p.user_id;
    entApi({action:'list'}).then(function(dd){
      if(dd&&!dd.error&&Array.isArray(dd.partners)){
        _lizFeatures=dd.features||_lizFeatures; _lizPartners=dd.partners; _lizTableMissing=!!dd.tableMissing;
        var cur=null; for(var i=0;i<_lizPartners.length;i++){ if(_lizPartners[i].user_id===pid) cur=_lizPartners[i]; }
        var real=cur&&cur.entitlements&&!!cur.entitlements[key];
        paintLizenz();
        toast(real===next ? (next?'Freigeschaltet ✓':'Gesperrt ✓') : 'Nicht gespeichert – bitte erneut');
      } else { toast(next?'Freigeschaltet':'Gesperrt'); }
    }).catch(function(){ toast(next?'Freigeschaltet':'Gesperrt'); });
  }).catch(function(){ ent[key]=!next; paintLizenz(); toast('Verbindungsfehler'); });
}

function jarvisAsk(frage){
  if(_jBusy||!frage) return;
  _jBusy=true;
  if(_jRecording) stopJarvisMic(true);
  // Verlauf VOR dieser Frage (für In-Conversation-Freigabe + Kontext); ohne Platzhalter.
  var verlauf=_jConv.filter(function(m){return m&&m.text&&m.text!=='…';})
    .slice(-12).map(function(m){return {role:m.role,text:m.text};});
  _jConv.push({role:'me',text:frage});
  _jConv.push({role:'jv',text:'…'});
  paintJConv();
  jState('Bob denkt nach','think');
  api('voice',{text:frage,verlauf:verlauf}).then(function(d){
    var antwort=(d&&d.antwort)||'Dazu habe ich gerade keine Antwort.';
    _jConv[_jConv.length-1]={role:'jv',text:antwort};
    paintJConv();
    if(d&&d.view){ _bobViewParams=d.params||null; go(d.view); }
    if(_jVoiceOn){ speakJarvis(antwort); } else { jState('Bereit für die nächste Frage.','idle'); resumeWake(); }
  }).catch(function(){
    _jConv[_jConv.length-1]={role:'jv',text:'Verbindungsfehler — bitte nochmal versuchen.'};
    paintJConv(); jState('Fehler. Bitte erneut fragen.','idle');
  }).then(function(){ _jBusy=false; });
}

function jGetAudio(){ if(!_jAudio){ _jAudio=new Audio(); _jAudio.preload='auto'; } return _jAudio; }
// Im Tap-Kontext aufrufen → entsperrt das Audio-Element für iOS, damit die spätere
// Sprachantwort (auch aus dem STT-Callback ohne Geste) abspielen darf.
function unlockJAudio(){
  if(_jAudioUnlocked) return;
  try{
    var a=jGetAudio();
    a.muted=true; a.src=_J_SILENT;
    var p=a.play();
    var done=function(){ try{ a.pause(); a.currentTime=0; }catch(e){} a.muted=false; _jAudioUnlocked=true; };
    if(p&&p.then) p.then(done).catch(function(){ a.muted=false; });
    else done();
  }catch(e){}
}
function stopSpeak(){
  try{ if(_jAudio){ _jAudio.pause(); } }catch(e){}
  if(_jCurUrl){ try{ URL.revokeObjectURL(_jCurUrl); }catch(e){} _jCurUrl=null; }
  hideJUnlock();
}
// ── Sprach-Aufbereitung (Zahlen sauber aussprechen) ──────────────────────────
// Übernimmt Baby BOBs Zahl-zu-Wort-Logik und erweitert sie um Datum + Uhrzeit.
// NUR die VORGELESENE Version wird umgeschrieben — der Chat zeigt weiter „CHF 34'384".
function _jZahl(n){
  n=Math.floor(Math.abs(n));
  if(n>999999999) return String(n);
  var e=['null','eins','zwei','drei','vier','fünf','sechs','sieben','acht','neun','zehn','elf','zwölf','dreizehn','vierzehn','fünfzehn','sechzehn','siebzehn','achtzehn','neunzehn'];
  var z=['','','zwanzig','dreissig','vierzig','fünfzig','sechzig','siebzig','achtzig','neunzig'];
  function u100(x){ if(x<20)return e[x]; var t=Math.floor(x/10),o=x%10; return (o?(o===1?'einund':e[o]+'und'):'')+z[t]; }
  function u1000(x){ if(x<100)return u100(x); var h=Math.floor(x/100),r=x%100; return (h===1?'ein':e[h])+'hundert'+(r?u1000(r):''); }
  if(n===0) return 'null';
  var out='', mio=Math.floor(n/1000000), th=Math.floor((n%1000000)/1000), rest=n%1000;
  if(mio>0) out+=(mio===1?'eine Million ':u1000(mio)+' Millionen ');
  if(th>0) out+=(th===1?'eintausend':u1000(th)+'tausend');
  if(rest>0) out+=u1000(rest);
  return out.trim();
}
function _jChf(num){
  var c=String(num).replace(/['’\s]/g,'').replace(',','.');
  var p=c.split('.'); var ganz=parseInt((p[0]||'').replace(/[^\d]/g,''),10);
  if(isNaN(ganz)) return num+' Franken';
  var w=_jZahl(ganz)+' Franken';
  if(p[1]){ var rp=parseInt(p[1].slice(0,2),10); if(rp>0) w+=' '+_jZahl(rp)+' Rappen'; }
  return w;
}
function _jNum(m){
  var c=String(m).replace(/['’\s]/g,'').replace(',','.');
  var p=c.split('.'); var ganz=parseInt((p[0]||'').replace(/[^\d]/g,''),10);
  if(isNaN(ganz)) return m;
  var w=_jZahl(ganz);
  if(p[1]&&parseInt(p[1],10)>0) w+=' Komma '+p[1].split('').map(function(d){return _jZahl(parseInt(d,10)||0);}).join(' ');
  return w;
}
function _jOrd(n){
  var sp={1:'erster',3:'dritter',7:'siebter',8:'achter'}; if(sp[n]) return sp[n];
  var w=_jZahl(n); return n<20 ? w+'ter' : w+'ster';
}
var _J_MONATE=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
var _J_ZIFFER=['null','eins','zwei','drei','vier','fünf','sechs','sieben','acht','neun'];
function _jSpellDigits(str){ var o=[]; String(str).replace(/[+\d]/g,function(c){ o.push(c==='+'?'plus':_J_ZIFFER[+c]); return c; }); return o.join(' '); }
var _J_STAEDTE='Zürich|Winterthur|Wädenswil|Bern|Basel|Genf|Lausanne|Luzern|Lugano|Zug|Chur|Thun|Schaffhausen|Sitten|Sion|Aarau|Frauenfeld|Solothurn|Uster|Rapperswil|Wil|Baden|Dietikon|Kloten|Horgen|Meilen|Bülach|Dübendorf|Biel|Olten|Wetzikon|Adliswil|Opfikon|Glarus|Liestal|Herisau|Bellinzona|Neuenburg|Freiburg|St\\. Gallen|Stäfa|Pfäffikon';
var _J_PLZRE=new RegExp('\\b(\\d{4})\\s+('+_J_STAEDTE+')\\b','g');
function jSanitizeSpeech(text){
  if(!text) return text;
  var s=String(text).replace(/[*#`_]/g,'');
  // Telefonnummern (+41 / 0 mit Gruppen) → Ziffern einzeln (statt einer Riesenzahl).
  s=s.replace(/(?:\+41|0)\s?\d{1,3}(?:[\s\/]\d{2,4}){2,4}/g,function(m){ return _jSpellDigits(m); });
  // Uhrzeit HH:MM → „… Uhr …" (00 → nur „… Uhr"); folgendes „Uhr" wird geschluckt.
  s=s.replace(/\b([01]?\d|2[0-3]):([0-5]\d)\b(\s*Uhr)?/gi,function(m,h,mi){
    var min=parseInt(mi,10); return _jZahl(parseInt(h,10))+' Uhr'+(min>0?' '+_jZahl(min):'');
  });
  // Datum TT.MM.(JJJJ) → „TTter MonatName (Jahr)".
  s=s.replace(/\b(\d{1,2})\.(\d{1,2})\.(\d{4}|\d{2})?/g,function(m,d,mo,y){
    var dd=parseInt(d,10), mm=parseInt(mo,10);
    if(dd<1||dd>31||mm<1||mm>12) return m;
    var out=_jOrd(dd)+' '+_J_MONATE[mm-1];
    if(y){ var yy=parseInt(y,10); if(y.length===2) yy=2000+yy; out+=' '+_jZahl(yy); }
    return out;
  });
  // Datum „TT. MonatName" (z. B. „24. Juni") → „TTter MonatName".
  s=s.replace(/\b(\d{1,2})\.\s+(Januar|Februar|März|April|Mai|Juni|Juli|August|September|Oktober|November|Dezember)\b/gi,function(m,d,mon){
    var dd=parseInt(d,10); if(dd<1||dd>31) return m; return _jOrd(dd)+' '+mon;
  });
  // PLZ (4-stellig) + Schweizer Stadt → Ziffern einzeln (z. B. „8045 Zürich").
  s=s.replace(_J_PLZRE,function(m,z,c){ return _jSpellDigits(z)+' '+c; });
  s=s.replace(/m²|m2\b/gi,' Quadratmeter');
  s=s.replace(/%/g,' Prozent');
  s=s.replace(/\s*\/\s*h\b/gi,' pro Stunde');
  // Negative Zahl: führendes Minus → „minus" (Bereiche mit Bindestrich bleiben unberührt).
  s=s.replace(/(^|[\s(])[-–](?=\d)/g,'$1minus ');
  // Zahl-Token endet immer auf einer Ziffer → Satzzeichen bleiben (saubere Sprech-Pausen).
  // CHF VOR Zahl: Bereich + Einzelbetrag.
  s=s.replace(/(?:CHF|Fr\.?)\s*(\d[\d'’.,]*\d|\d)\s*[–-]\s*(\d[\d'’.,]*\d|\d)/gi,function(m,a,b){ return _jChf(a).replace(/ Franken.*$/,'')+' bis '+_jChf(b); });
  s=s.replace(/(?:CHF|Fr\.?)\s*(\d[\d'’.,]*\d|\d)/gi,function(m,a){ return _jChf(a); });
  // Zahl VOR CHF/Franken (z. B. „1'250'000 CHF").
  s=s.replace(/(\d[\d'’.,]*\d|\d)\s*(?:CHF|Fr\.?|Franken)\b/gi,function(m,a){ return _jChf(a); });
  // Reiner Zahlenbereich.
  s=s.replace(/(\d[\d'’.,]*\d|\d)\s*[–-]\s*(\d[\d'’.,]*\d|\d)/g,function(m,a,b){ return _jNum(a)+' bis '+_jNum(b); });
  // Restliche Zahlen.
  s=s.replace(/\d[\d'’.,]*\d|\d/g,function(m){ return _jNum(m); });
  // Übrig gebliebenes „CHF" → „Franken".
  s=s.replace(/\bCHF\b/g,'Franken');
  return s.replace(/\s{2,}/g,' ').trim();
}
function speakJarvis(text){
  stopSpeak();
  jState('Bob spricht','speak');
  var spoken=jSanitizeSpeech(text);   // nur die vorgelesene Version; Chat bleibt unverändert
  // eleven_flash_v2_5 = niedrige Latenz → Stimme startet schneller (gute Qualität bleibt).
  fetch('/api/voice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:spoken,model_id:'eleven_flash_v2_5'})})
  .then(function(r){
    var ct=r.headers.get('content-type')||'';
    if(r.ok && ct.indexOf('audio')>-1){ return r.blob().then(playJBlob); }
    // Kein Audio → echten Grund aus der JSON-Fehlerantwort lesen (Quota? Key? Rate-Limit?).
    return r.json().catch(function(){ return {}; }).then(function(j){ jTtsError(j); });
  }).catch(function(){ jTtsError({}); });
}
function playJBlob(blob){
  var url=URL.createObjectURL(blob); _jCurUrl=url;
  var a=jGetAudio();
  a.src=url; a.muted=false;
  a.onended=function(){ stopSpeak(); jState('Bereit für die nächste Frage.','idle'); resumeWake(); };
  a.onerror=function(){ jState('Bereit für die nächste Frage.','idle'); resumeWake(); };
  var p=a.play();
  // Autoplay blockiert → KEINE Browser-Stimme, sondern Tap-Button für dieselbe ElevenLabs-Aufnahme.
  if(p&&p.catch) p.catch(function(){ showJUnlock(); });
}
// Ehrliche Diagnose statt pauschal „nicht verfügbar": Guthaben leer wird klar benannt,
// damit Master George weiss, dass er ElevenLabs aufladen muss (kein Code-Problem).
function jTtsError(j){
  var d=((j&&(j.detail||j.error))||'')+'';
  if(/quota|credit|exceeds your quota/i.test(d)){
    jState('Stimme: ElevenLabs-Guthaben erschöpft — bitte aufladen. (Antwort steht oben.)','idle');
    toast('ElevenLabs-Guthaben leer');
  } else if(/not configured|api key|unauthor/i.test(d)){
    jState('Stimme: ElevenLabs-Key fehlt im Server. (Antwort steht oben.)','idle');
    toast('Stimme: Key fehlt');
  } else {
    jState('Stimme momentan nicht verfügbar — Antwort steht oben.','idle');
    toast('Stimme nicht verfügbar');
  }
  resumeWake();   // trotz Stimm-Fehler weiter zuhören
}
// „Antippen zum Hören" — erscheint nur, wenn der Browser das Autoplay blockiert.
function showJUnlock(){
  jState('Antippen zum Hören 🔊','idle');
  var bar=$('j-conv'); if(!bar) return;
  if($('j-unlock')) return;
  var b=document.createElement('button');
  b.id='j-unlock'; b.className='jchip'; b.style.cssText='display:block;margin:8px auto;background:linear-gradient(135deg,#d8b96e,#b8954d);color:#0a0e14;font-weight:800;border:none;';
  b.textContent='🔊 Antippen zum Hören';
  b.onclick=function(){ _jAudioUnlocked=true; var a=jGetAudio(); var p=a.play(); if(p&&p.then) p.then(function(){ hideJUnlock(); jState('Bob spricht','speak'); }).catch(function(){}); };
  bar.appendChild(b);
